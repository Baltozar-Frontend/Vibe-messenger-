<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIBE VISION</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        :root {
            --bg: #000; --glass: rgba(20, 20, 22, 0.85);
            --accent: #0a84ff; --danger: #ff453a; --success: #32d74b;
            --text: #fff; --muted: #8e8e93;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* --- ГЛАВНЫЙ ЭКРАН --- */
        #app { flex: 1; display: flex; flex-direction: column; transition: 0.3s; }
        header { padding: 50px 20px 20px; background: #111; border-bottom: 1px solid #222; }
        .my-name { font-size: 32px; font-weight: 800; color: var(--text); cursor: pointer; text-decoration: underline; text-decoration-color: var(--muted); }
        #contact-list { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .user-card { background: var(--glass); padding: 15px; border-radius: 16px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; }
        .c-info b { font-size: 18px; } .c-info span { font-size: 12px; color: var(--success); display: block; margin-top: 4px; }
        .c-btn { background: var(--accent); color: #fff; border: none; padding: 8px 16px; border-radius: 16px; font-weight: bold; cursor: pointer; }

        /* --- ОКНО ЧАТА --- */
        #chat-window { position: fixed; inset: 0; background: var(--bg); z-index: 500; display: none; flex-direction: column; transform: translateX(100%); transition: 0.3s; }
        #chat-window.active { display: flex; transform: translateX(0); }
        .chat-head { padding: 45px 15px 15px; background: var(--glass); display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #333; backdrop-filter: blur(10px); }
        .back-link { font-size: 28px; color: var(--accent); cursor: pointer; padding-right: 10px; }
        .call-btn { background: var(--success); width: 40px; height: 40px; border-radius: 50%; border: none; font-size: 18px; cursor: pointer; }

        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 75%; padding: 10px 14px; border-radius: 18px; font-size: 15px; line-height: 1.4; position: relative; user-select: none; }
        .msg.mine { align-self: flex-end; background: var(--accent); border-bottom-right-radius: 4px; }
        .msg.other { align-self: flex-start; background: #2c2c2e; border-bottom-left-radius: 4px; }
        .msg img { max-width: 100%; border-radius: 10px; margin-top: 5px; }
        .msg audio { max-width: 200px; height: 35px; margin-top: 5px; }
        .m-time { font-size: 10px; opacity: 0.6; display: block; margin-top: 4px; text-align: right; }

        /* ВВОД & ПЕЧАТАЕТ */
        .typing-ind { font-size: 12px; color: var(--accent); padding: 0 15px; height: 15px; font-style: italic; opacity: 0; transition: 0.2s; }
        .typing-ind.show { opacity: 1; }
        .input-area { padding: 10px 15px 25px; background: #1c1c1e; display: flex; gap: 10px; align-items: center; }
        .msg-input { flex: 1; background: #000; border: 1px solid #333; color: #fff; padding: 12px 16px; border-radius: 20px; outline: none; font-size: 16px; }
        .action-btn { background: none; border: none; color: var(--accent); font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 50%; }
        .record-btn { background: var(--danger); color: white; }

        /* --- ЭКРАН ВИДЕОЗВОНКА --- */
        #call-screen { position: fixed; inset: 0; background: #000; z-index: 1000; display: none; flex-direction: column; }
        #remote-video { width: 100%; height: 100%; object-fit: cover; position: absolute; z-index: 1; }
        #local-video { width: 100px; height: 150px; object-fit: cover; position: absolute; bottom: 120px; right: 20px; z-index: 2; border-radius: 12px; border: 2px solid #333; background: #222; }
        .call-ui { position: absolute; inset: 0; z-index: 3; display: flex; flex-direction: column; justify-content: space-between; padding: 50px 20px 40px; pointer-events: none; background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 20%, transparent 80%, rgba(0,0,0,0.8) 100%); }
        .call-info { text-align: center; pointer-events: auto; }
        .call-name { font-size: 28px; font-weight: bold; }
        .call-status { font-size: 16px; color: var(--muted); margin-top: 5px; }
        .call-controls { display: flex; justify-content: center; gap: 30px; pointer-events: auto; }
        .btn-call { width: 70px; height: 70px; border-radius: 50%; border: none; font-size: 28px; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-end { background: var(--danger); } .btn-accept { background: var(--success); display: none; }
    </style>
</head>
<body>

<div id="app">
    <header>
        <div style="font-size: 12px; color: var(--muted); margin-bottom: 5px;">ВАШ ПРОФИЛЬ</div>
        <div class="my-name" onclick="changeName()" id="ui-my-name">User</div>
    </header>
    <div id="contact-list"><div style="text-align:center; padding: 40px; color: #888;">Поиск сети...</div></div>
</div>

<div id="chat-window">
    <div class="chat-head">
        <div class="back-link" onclick="closeChat()">‹</div>
        <div style="flex:1;">
            <b id="partner-nick" style="font-size: 18px;">Имя</b>
        </div>
        <button class="call-btn" onclick="startCall()">📹</button>
    </div>
    <div id="messages"></div>
    <div class="typing-ind" id="typing-ui">печатает...</div>
    <div class="input-area">
        <label class="action-btn" style="color: var(--muted);">+<input type="file" id="img-up" accept="image/*" style="display:none"></label>
        <input type="text" id="main-input" class="msg-input" placeholder="Сообщение" oninput="handleTyping()">
        <button class="action-btn" id="mic-btn" style="color:var(--muted)">🎤</button>
        <button class="action-btn" onclick="sendVibe('text')">➤</button>
    </div>
</div>

<div id="call-screen">
    <video id="remote-video" autoplay playsinline></video>
    <video id="local-video" autoplay playsinline muted></video>
    <div class="call-ui">
        <div class="call-info">
            <div class="call-name" id="call-name">Имя</div>
            <div class="call-status" id="call-status">Входящий звонок...</div>
        </div>
        <div class="call-controls">
            <button class="btn-call btn-end" onclick="endCall()">☎</button>
            <button class="btn-call btn-accept" id="btn-accept-call" onclick="acceptCall()">📹</button>
        </div>
    </div>
</div>

<script>
    if (sessionStorage.getItem('vibe_access_granted') !== 'true') window.location.replace('index.html');

    const BROKER = 'wss://broker.emqx.io:8084/mqtt';
    const GLOBAL_TOPIC = 'vibe_v9_radar';
    
    let my = {
        id: localStorage.getItem('vibe_v9_id') || 'u_' + Math.random().toString(36).substr(2, 9),
        nick: localStorage.getItem('vibe_v9_nick') || 'User_' + Math.floor(Math.random()*99),
    };
    localStorage.setItem('vibe_v9_id', my.id);
    document.getElementById('ui-my-name').innerText = my.nick;

    let client, activeChat = null, users = new Map(), typingTimer;
    let db = JSON.parse(localStorage.getItem('vibe_v9_db')) || {};

    // WEBRTC Переменные
    let localStream, peerConnection, currentCallPartner = null;
    let iceQueue = []; // Очередь для защиты от рассинхрона
    const rtcConfig = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

    // ГОЛОСОВЫЕ Переменные
    let mediaRecorder, audioChunks = [];

    function init() {
        client = mqtt.connect(BROKER, { clientId: 'cl_' + my.id });
        client.on('connect', () => {
            client.subscribe([GLOBAL_TOPIC, `v_dir_${my.id}`]);
            broadcast();
        });

        client.on('message', async (topic, payload) => {
            const data = JSON.parse(payload.toString());
            if (topic === GLOBAL_TOPIC) {
                if (data.type === 'HELLO') { users.set(data.user.id, { ...data.user, last: Date.now() }); client.publish(GLOBAL_TOPIC, JSON.stringify({ type: 'WELCOME', to: data.user.id, user: my })); renderUsers(); }
                if (data.type === 'WELCOME' && data.to === my.id) { users.set(data.user.id, { ...data.user, last: Date.now() }); renderUsers(); }
            } else {
                handleDirect(data);
            }
        });
    }

    function changeName() {
        const n = prompt("Новое имя:", my.nick);
        if (n && n.trim()) { my.nick = n.trim(); localStorage.setItem('vibe_v9_nick', my.nick); document.getElementById('ui-my-name').innerText = my.nick; broadcast(); }
    }
    function broadcast() { client.publish(GLOBAL_TOPIC, JSON.stringify({ type: 'HELLO', user: my })); }

    async function handleDirect(msg) {
        if (['text', 'image', 'audio'].includes(msg.type)) {
            save(msg.from, msg);
            if (activeChat === msg.from) { document.getElementById('typing-ui').classList.remove('show'); loadMsgs(); }
        } 
        else if (msg.type === 'DELETE') {
            if (db[msg.from]) {
                db[msg.from] = db[msg.from].filter(m => m.mId !== msg.msgId);
                localStorage.setItem('vibe_v9_db', JSON.stringify(db));
                if (activeChat === msg.from) loadMsgs();
            }
        }
        else if (msg.type === 'TYPING' && activeChat === msg.from) {
            const ui = document.getElementById('typing-ui'); ui.classList.add('show');
            clearTimeout(typingTimer); typingTimer = setTimeout(() => ui.classList.remove('show'), 2000);
        }
        // WebRTC Обработка с защитой
        else if (msg.type === 'CALL_OFFER') { handleIncomingCall(msg); }
        else if (msg.type === 'CALL_ANSWER') {
            await peerConnection.setRemoteDescription(new RTCSessionDescription(msg.sdp));
            processIceQueue();
        }
        else if (msg.type === 'CALL_ICE') {
            if (peerConnection && peerConnection.remoteDescription) {
                peerConnection.addIceCandidate(new RTCIceCandidate(msg.candidate));
            } else {
                iceQueue.push(msg.candidate); // Ждем, пока установится RemoteDescription
            }
        }
        else if (msg.type === 'CALL_END') { closeCallUI(); }
    }

    // --- ЧАТ ---
    function handleTyping() { if (activeChat) client.publish(`v_dir_${activeChat}`, JSON.stringify({ type: 'TYPING', from: my.id })); }

    function sendVibe(type = 'text', content = null) {
        const txt = content || document.getElementById('main-input').value.trim();
        if (!txt || !activeChat) return;
        const packet = { mId: Math.random().toString(36).substr(2,9), from: my.id, nick: my.nick, body: txt, type: type, time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) };
        client.publish(`v_dir_${activeChat}`, JSON.stringify(packet), { qos: 1 });
        save(activeChat, packet);
        if (type === 'text') document.getElementById('main-input').value = '';
        loadMsgs();
    }

    function deleteMsg(msgId, partnerId) {
        if(!confirm("Удалить сообщение у всех?")) return;
        client.publish(`v_dir_${partnerId}`, JSON.stringify({ type: 'DELETE', from: my.id, msgId: msgId }));
        db[partnerId] = db[partnerId].filter(m => m.mId !== msgId);
        localStorage.setItem('vibe_v9_db', JSON.stringify(db));
        loadMsgs();
    }

    function renderUsers() {
        const list = document.getElementById('contact-list'); list.innerHTML = '';
        users.forEach((u, id) => {
            if (id === my.id) return;
            list.innerHTML += `<div class="user-card"><div class="c-info"><b>${u.nick}</b><span>В сети</span></div><button class="c-btn" onclick="openChat('${id}')">ЧАТ</button></div>`;
        });
    }

    function openChat(id) {
        activeChat = id; document.getElementById('partner-nick').innerText = users.get(id).nick;
        document.getElementById('chat-window').classList.add('active'); loadMsgs();
    }
    function closeChat() { document.getElementById('chat-window').classList.remove('active'); activeChat = null; }
    
    function save(id, msg) { if (!db[id]) db[id] = []; db[id].push(msg); localStorage.setItem('vibe_v9_db', JSON.stringify(db)); }
    
    function loadMsgs() {
        const box = document.getElementById('messages'); box.innerHTML = '';
        (db[activeChat] || []).forEach(m => {
            const isMine = m.from === my.id;
            const onclickCode = isMine ? `ondblclick="deleteMsg('${m.mId}', '${activeChat}')"` : '';
            const content = m.type === 'text' ? m.body : m.type === 'audio' ? `<audio controls src="${m.body}"></audio>` : `<img src="${m.body}">`;
            box.innerHTML += `<div class="msg ${isMine ? 'mine' : 'other'}" ${onclickCode}>${content}<span class="m-time">${m.time}</span></div>`;
        });
        box.scrollTop = box.scrollHeight;
    }

    document.getElementById('main-input').onkeypress = (e) => { if(e.key==='Enter') sendVibe('text'); };

    // --- ФОТО И ГОЛОС ---
    document.getElementById('img-up').onchange = (e) => {
        const f = e.target.files[0]; const r = new FileReader();
        r.onload = (ev) => { const img = new Image(); img.src = ev.target.result; img.onload = () => { const cvs = document.createElement('canvas'); const s = 400 / img.width; cvs.width = 400; cvs.height = img.height * s; cvs.getContext('2d').drawImage(img,0,0,400,cvs.height); sendVibe('image', cvs.toDataURL('image/jpeg', 0.5)); }; };
        r.readAsDataURL(f);
    };

    const micBtn = document.getElementById('mic-btn');
    micBtn.onmousedown = micBtn.ontouchstart = async (e) => {
        e.preventDefault();
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(audioChunks, { type: 'audio/webm' });
                const reader = new FileReader();
                reader.onloadend = () => sendVibe('audio', reader.result);
                reader.readAsDataURL(blob);
                audioChunks = [];
            };
            mediaRecorder.start();
            micBtn.classList.add('record-btn');
        } catch(e) { alert("Дайте разрешение на микрофон!"); }
    };
    micBtn.onmouseup = micBtn.ontouchend = (e) => {
        e.preventDefault();
        if(mediaRecorder && mediaRecorder.state === "recording") { mediaRecorder.stop(); mediaRecorder.stream.getTracks().forEach(t=>t.stop()); micBtn.classList.remove('record-btn'); }
    };

    // --- ЗВОНКИ (WebRTC + Видео + Очередь) ---
    async function startCall() {
        if (!activeChat) return;
        currentCallPartner = activeChat;
        showCallUI('Звоним...', users.get(activeChat).nick, false);

        try {
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('local-video').srcObject = localStream;
            createPeerConnection();
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            client.publish(`v_dir_${currentCallPartner}`, JSON.stringify({ type: 'CALL_OFFER', from: my.id, nick: my.nick, sdp: offer }));
        } catch (err) { alert('Нет камеры или микрофона!'); closeCallUI(); }
    }

    let incomingOffer = null;
    function handleIncomingCall(msg) {
        currentCallPartner = msg.from; incomingOffer = msg.sdp;
        showCallUI('Входящий видеовызов...', msg.nick, true);
    }

    async function acceptCall() {
        document.getElementById('btn-accept-call').style.display = 'none';
        document.getElementById('call-status').innerText = 'Соединение...';

        try {
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('local-video').srcObject = localStream;
            createPeerConnection();
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

            await peerConnection.setRemoteDescription(new RTCSessionDescription(incomingOffer));
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);

            client.publish(`v_dir_${currentCallPartner}`, JSON.stringify({ type: 'CALL_ANSWER', from: my.id, sdp: answer }));
            document.getElementById('call-status').innerText = 'На линии';
        } catch (err) { alert('Ошибка доступа к камере!'); endCall(); }
    }

    function createPeerConnection() {
        peerConnection = new RTCPeerConnection(rtcConfig);
        iceQueue = [];

        peerConnection.onicecandidate = (event) => {
            if (event.candidate) client.publish(`v_dir_${currentCallPartner}`, JSON.stringify({ type: 'CALL_ICE', from: my.id, candidate: event.candidate }));
        };

        peerConnection.ontrack = (event) => {
            document.getElementById('remote-video').srcObject = event.streams[0];
            document.getElementById('call-status').innerText = ''; // Скрываем текст
        };
    }

    function processIceQueue() {
        while (iceQueue.length > 0) { peerConnection.addIceCandidate(new RTCIceCandidate(iceQueue.shift())); }
    }

    function endCall() {
        if (currentCallPartner) client.publish(`v_dir_${currentCallPartner}`, JSON.stringify({ type: 'CALL_END', from: my.id }));
        closeCallUI();
    }

    function closeCallUI() {
        document.getElementById('call-screen').style.display = 'none';
        if (peerConnection) { peerConnection.close(); peerConnection = null; }
        if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
        currentCallPartner = null; incomingOffer = null;
    }

    function showCallUI(status, name, showAccept) {
        document.getElementById('call-screen').style.display = 'flex';
        document.getElementById('call-status').innerText = status; document.getElementById('call-name').innerText = name;
        document.getElementById('btn-accept-call').style.display = showAccept ? 'flex' : 'none';
    }

    setInterval(() => { let changed = false; users.forEach((u, id) => { if (Date.now() - u.last > 8000) { users.delete(id); changed = true; } }); if (changed) renderUsers(); }, 5000);

    init();
</script>

</body>
</html>
