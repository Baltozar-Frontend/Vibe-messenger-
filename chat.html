<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIBE CORE</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        :root {
            --bg: #000; --glass: #141416;
            --accent: #3390ec; --danger: #ff3b30; --success: #34c759;
            --text: #fff; --muted: #8e8e93; --msg-bg: #212124;
            --check-sent: #707579; --check-read: #3390ec;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

        /* --- ГЛАВНЫЙ ЭКРАН --- */
        #app { flex: 1; display: flex; flex-direction: column; transition: transform 0.3s ease; }
        header { padding: 40px 20px 20px; background: #0a0a0a; border-bottom: 1px solid #1c1c1e; }
        .my-profile { display: flex; justify-content: space-between; align-items: center; }
        .my-name { font-size: 26px; font-weight: 700; cursor: pointer; color: var(--text); }
        .status-dot { width: 8px; height: 8px; background: var(--success); border-radius: 50%; box-shadow: 0 0 5px var(--success); }

        #contact-list { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
        .user-card { background: var(--glass); padding: 16px; border-radius: 14px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.1s; }
        .user-card:active { transform: scale(0.98); background: #1c1c1e; }
        .c-info b { font-size: 16px; display: block; margin-bottom: 4px; }
        .c-info span { font-size: 13px; color: var(--success); }
        .unread-badge { background: var(--accent); color: white; font-size: 12px; font-weight: bold; padding: 2px 8px; border-radius: 12px; display: none; }

        /* --- ОКНО ЧАТА --- */
        #chat-window { position: fixed; inset: 0; background: var(--bg); z-index: 500; display: none; flex-direction: column; transform: translateX(100%); transition: transform 0.3s ease; }
        #chat-window.active { display: flex; transform: translateX(0); }
        .chat-head { padding: 45px 15px 12px; background: #111; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #222; }
        .back-link { font-size: 26px; color: var(--accent); cursor: pointer; padding: 0 10px; font-weight: 400; }
        .call-btn { background: transparent; color: var(--accent); border: none; font-size: 24px; cursor: pointer; padding: 5px; }

        #messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
        
        .msg { max-width: 82%; padding: 8px 12px; border-radius: 16px; font-size: 15px; line-height: 1.4; position: relative; word-wrap: break-word; }
        .msg.mine { align-self: flex-end; background: var(--accent); border-bottom-right-radius: 4px; color: #fff; }
        .msg.other { align-self: flex-start; background: var(--msg-bg); border-bottom-left-radius: 4px; color: #fff; }
        .msg img { max-width: 100%; border-radius: 8px; margin-top: 4px; display: block; }
        .msg audio { max-width: 220px; height: 32px; margin-top: 4px; outline: none; }
        
        .msg-meta { display: flex; align-items: center; justify-content: flex-end; gap: 4px; margin-top: 2px; font-size: 11px; color: rgba(255,255,255,0.7); float: right; margin-left: 10px; }
        .ticks { font-size: 12px; letter-spacing: -2px; }
        .tick-sent { color: rgba(255,255,255,0.7); }
        .tick-read { color: #fff; font-weight: bold; }

        /* ВВОД */
        .typing-ind { font-size: 13px; color: var(--accent); padding: 4px 20px; height: 25px; opacity: 0; transition: 0.2s; }
        .typing-ind.show { opacity: 1; }
        .input-area { padding: 8px 12px 25px; background: #0a0a0a; display: flex; gap: 8px; align-items: flex-end; border-top: 1px solid #1c1c1e; }
        .msg-input { flex: 1; background: #1c1c1e; border: none; color: #fff; padding: 12px 16px; border-radius: 20px; outline: none; font-size: 16px; max-height: 100px; resize: none; overflow-y: auto; }
        .action-btn { background: transparent; border: none; color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; font-size: 24px; flex-shrink: 0; }
        .send-btn { background: var(--accent); color: white; border-radius: 50%; width: 40px; height: 40px; font-size: 18px; display: none; }
        .send-btn.show { display: flex; }
        .mic-btn.hide { display: none; }
        .record-btn { color: var(--danger); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        /* ЭКРАН ЗВОНКА */
        #call-screen { position: fixed; inset: 0; background: #000; z-index: 1000; display: none; flex-direction: column; }
        #remote-video { width: 100%; height: 100%; object-fit: cover; position: absolute; z-index: 1; }
        #local-video { width: 110px; height: 160px; object-fit: cover; position: absolute; bottom: 100px; right: 20px; z-index: 2; border-radius: 12px; background: #222; }
        .call-ui { position: absolute; inset: 0; z-index: 3; display: flex; flex-direction: column; justify-content: space-between; padding: 60px 20px 40px; pointer-events: none; background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 20%, transparent 80%, rgba(0,0,0,0.8) 100%); }
        .call-info { text-align: center; pointer-events: auto; }
        .call-controls { display: flex; justify-content: center; gap: 40px; pointer-events: auto; }
        .btn-call { width: 70px; height: 70px; border-radius: 50%; border: none; font-size: 30px; color: white; cursor: pointer; }
        .btn-end { background: var(--danger); } .btn-accept { background: var(--success); display: none; }
    </style>
</head>
<body>

<div id="app">
    <header>
        <div style="font-size: 11px; color: var(--muted); margin-bottom: 4px; text-transform: uppercase;">Имя в сети</div>
        <div class="my-profile">
            <div class="my-name" onclick="changeName()" id="ui-my-name">User</div>
            <div style="display:flex; align-items:center; gap:6px;">
                <div class="status-dot"></div><span style="font-size:12px; color:var(--muted);">Подключено</span>
            </div>
        </div>
    </header>
    <div id="contact-list"><div style="text-align:center; padding: 40px; color: #555;">Ищем людей рядом...</div></div>
</div>

<div id="chat-window">
    <div class="chat-head">
        <div class="back-link" onclick="closeChat()">‹</div>
        <div style="flex:1;">
            <b id="partner-nick" style="font-size: 17px; display:block;">Имя</b>
            <div id="partner-status" style="font-size: 13px; color: var(--muted);">был(а) недавно</div>
        </div>
        <button class="call-btn" onclick="startCall()">📞</button>
    </div>
    <div id="messages"></div>
    <div class="typing-ind" id="typing-ui">печатает...</div>
    <div class="input-area">
        <label class="action-btn">📎<input type="file" id="img-up" accept="image/*" style="display:none"></label>
        <textarea id="main-input" class="msg-input" placeholder="Сообщение" rows="1" oninput="handleInput()"></textarea>
        <button class="action-btn mic-btn" id="mic-btn">🎤</button>
        <button class="action-btn send-btn" id="send-btn" onclick="sendVibe('text')">➤</button>
    </div>
</div>

<div id="call-screen">
    <video id="remote-video" autoplay playsinline></video>
    <video id="local-video" autoplay playsinline muted></video>
    <div class="call-ui">
        <div class="call-info">
            <div id="call-name" style="font-size: 28px; font-weight: bold;">Имя</div>
            <div id="call-status" style="font-size: 16px; color: rgba(255,255,255,0.7); margin-top: 8px;">Вызов...</div>
        </div>
        <div class="call-controls">
            <button class="btn-call btn-end" onclick="endCall()">☎</button>
            <button class="btn-call btn-accept" id="btn-accept-call" onclick="acceptCall()">📞</button>
        </div>
    </div>
</div>

<script>
    const BROKER = 'wss://broker.emqx.io:8084/mqtt';
    const GLOBAL_TOPIC = 'vibe_v11_core_radar'; // Новый топик, чтобы не было конфликтов
    
    let my = {
        id: localStorage.getItem('vibe_id') || 'u_' + Math.random().toString(36).substr(2, 9),
        nick: localStorage.getItem('vibe_nick') || 'User_' + Math.floor(Math.random()*999),
    };
    localStorage.setItem('vibe_id', my.id);
    document.getElementById('ui-my-name').innerText = my.nick;

    let client, activeChat = null, typingTimer;
    let users = new Map();
    let db = JSON.parse(localStorage.getItem('vibe_db')) || {};

    let mediaRecorder, audioChunks = [];
    let localStream, peerConnection, currentCallPartner = null, iceQueue = [];
    const rtcConfig = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

    function init() {
        client = mqtt.connect(BROKER, { clientId: 'core_' + my.id + '_' + Math.random().toString(16).substr(2,4) });
        
        client.on('connect', () => {
            client.subscribe([GLOBAL_TOPIC], { qos: 0 });
            client.subscribe([`v_dir_${my.id}`], { qos: 1 }); 
            // ИДЕАЛЬНЫЙ РАДАР: Пульсируем каждые 2 секунды
            setInterval(broadcastPing, 2000);
            broadcastPing();
        });

        client.on('message', async (topic, payload) => {
            const data = JSON.parse(payload.toString());
            if (data.from === my.id || (data.user && data.user.id === my.id)) return;

            if (topic === GLOBAL_TOPIC && data.type === 'PING') {
                updateUser(data.user);
            } else {
                handleDirect(data);
            }
        });

        // ИДЕАЛЬНЫЙ РАДАР: Удаляем тех, кто молчит больше 6 секунд
        setInterval(() => {
            let changed = false;
            users.forEach((u, id) => {
                if (Date.now() - u.last > 6000) { users.delete(id); changed = true; }
            });
            if (changed) renderUsers();
        }, 2000);
    }

    function broadcastPing() {
        if (client && client.connected) {
            client.publish(GLOBAL_TOPIC, JSON.stringify({ type: 'PING', user: my }), {qos: 0});
        }
    }

    function updateUser(u) {
        if (!users.has(u.id)) {
            users.set(u.id, { ...u, last: Date.now(), unread: 0 });
            renderUsers();
        } else {
            let existing = users.get(u.id);
            if (existing.nick !== u.nick) { existing.nick = u.nick; renderUsers(); }
            existing.last = Date.now();
        }
    }

    function changeName() {
        const n = prompt("Ваше имя:", my.nick);
        if (n && n.trim()) { 
            my.nick = n.trim(); 
            localStorage.setItem('vibe_nick', my.nick); 
            document.getElementById('ui-my-name').innerText = my.nick; 
            broadcastPing(); 
        }
    }

    async function handleDirect(msg) {
        const pId = msg.from;

        if (['text', 'image', 'audio'].includes(msg.type)) {
            if (!db[pId]) db[pId] = [];
            if (db[pId].find(m => m.mId === msg.mId)) return; 
            
            msg.status = 3; 
            db[pId].push(msg);
            saveDB();

            if (activeChat === pId) {
                client.publish(`v_dir_${pId}`, JSON.stringify({ type: 'ACK', mId: msg.mId, from: my.id }), {qos: 1});
                document.getElementById('typing-ui').classList.remove('show');
                loadMsgs();
                scrollBottom();
            } else {
                let u = users.get(pId);
                if (u) { u.unread = (u.unread || 0) + 1; renderUsers(); }
            }
        } 
        else if (msg.type === 'ACK') {
            if (db[pId]) {
                let m = db[pId].find(x => x.mId === msg.mId);
                if (m && m.status < 3) { m.status = 3; saveDB(); if (activeChat === pId) loadMsgs(); }
            }
        }
        else if (msg.type === 'DELETE') {
            if (db[pId]) { db[pId] = db[pId].filter(m => m.mId !== msg.msgId); saveDB(); if (activeChat === pId) loadMsgs(); }
        }
        else if (msg.type === 'TYPING' && activeChat === pId) {
            const ui = document.getElementById('typing-ui'); ui.classList.add('show');
            clearTimeout(typingTimer); typingTimer = setTimeout(() => ui.classList.remove('show'), 1500);
        }
        else if (msg.type === 'CALL_OFFER') handleIncomingCall(msg);
        else if (msg.type === 'CALL_ANSWER') { await peerConnection.setRemoteDescription(new RTCSessionDescription(msg.sdp)); processIceQueue(); }
        else if (msg.type === 'CALL_ICE') {
            if (peerConnection && peerConnection.remoteDescription) peerConnection.addIceCandidate(new RTCIceCandidate(msg.candidate));
            else iceQueue.push(msg.candidate);
        }
        else if (msg.type === 'CALL_END') closeCallUI();
    }

    function sendVibe(type = 'text', content = null) {
        const inp = document.getElementById('main-input');
        const txt = content || inp.value.trim();
        if (!txt && type === 'text') return;
        if (!activeChat) return;

        const packet = { 
            mId: 'm_' + Date.now(), from: my.id, body: txt, type: type, 
            time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}), status: 1
        };
        
        if (!db[activeChat]) db[activeChat] = [];
        db[activeChat].push(packet);
        saveDB();

        client.publish(`v_dir_${activeChat}`, JSON.stringify(packet), { qos: 1 });
        
        if (type === 'text') { 
            inp.value = ''; 
            inp.style.height = 'auto'; 
            handleInput(); 
        }
        loadMsgs();
        scrollBottom();
    }

    function deleteMsg(msgId, partnerId) {
        if(!confirm("Удалить сообщение?")) return;
        client.publish(`v_dir_${partnerId}`, JSON.stringify({ type: 'DELETE', from: my.id, msgId: msgId }), {qos: 1});
        db[partnerId] = db[partnerId].filter(m => m.mId !== msgId);
        saveDB(); loadMsgs();
    }

    function saveDB() { localStorage.setItem('vibe_db', JSON.stringify(db)); }

    function renderUsers() {
        const list = document.getElementById('contact-list'); list.innerHTML = '';
        if (users.size === 0) { list.innerHTML = '<div style="text-align:center; padding: 40px; color: #555;">Нет пользователей онлайн</div>'; return; }
        
        users.forEach((u, id) => {
            const unreadHTML = u.unread > 0 ? `<div class="unread-badge" style="display:block">${u.unread}</div>` : '';
            list.innerHTML += `
                <div class="user-card" onclick="openChat('${id}')">
                    <div class="c-info"><b>${u.nick}</b><span>в сети</span></div>
                    ${unreadHTML}
                </div>`;
        });
    }

    function openChat(id) {
        activeChat = id; 
        const u = users.get(id);
        document.getElementById('partner-nick').innerText = u ? u.nick : 'Собеседник';
        document.getElementById('partner-status').innerText = 'в сети';
        
        if (u) { u.unread = 0; renderUsers(); }

        if (db[id]) {
            db[id].forEach(m => {
                if (m.from === id && m.status !== 3) {
                    client.publish(`v_dir_${id}`, JSON.stringify({ type: 'ACK', mId: m.mId, from: my.id }), {qos: 1});
                    m.status = 3;
                }
            });
            saveDB();
        }

        document.getElementById('chat-window').classList.add('active'); 
        loadMsgs(); setTimeout(scrollBottom, 50);
    }
    
    function closeChat() { document.getElementById('chat-window').classList.remove('active'); activeChat = null; }
    
    function getTicks(status) {
        if (status === 1) return `<span class="ticks tick-sent">✓</span>`;
        if (status === 3) return `<span class="ticks tick-read">✓✓</span>`;
        return '';
    }

    function loadMsgs() {
        const box = document.getElementById('messages'); box.innerHTML = '';
        (db[activeChat] || []).forEach(m => {
            const isMine = m.from === my.id;
            const onclick = isMine ? `ondblclick="deleteMsg('${m.mId}', '${activeChat}')"` : '';
            const content = m.type === 'text' ? m.body : m.type === 'audio' ? `<audio controls src="${m.body}"></audio>` : `<img src="${m.body}">`;
            const ticks = isMine ? getTicks(m.status) : '';
            
            box.innerHTML += `
                <div class="msg ${isMine ? 'mine' : 'other'}" ${onclick}>
                    ${content}<span class="msg-meta">${m.time} ${ticks}</span>
                </div>`;
        });
    }

    function scrollBottom() { const b = document.getElementById('messages'); b.scrollTop = b.scrollHeight; }

    const tx = document.getElementById('main-input');
    function handleInput() {
        tx.style.height = 'auto'; tx.style.height = (tx.scrollHeight) + 'px';
        const hasText = tx.value.trim().length > 0;
        document.getElementById('send-btn').classList.toggle('show', hasText);
        document.getElementById('mic-btn').classList.toggle('hide', hasText);
        if (activeChat && hasText) client.publish(`v_dir_${activeChat}`, JSON.stringify({ type: 'TYPING', from: my.id }), {qos:0});
    }
    tx.onkeypress = (e) => { if(e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendVibe('text'); } };

    // Фото и Голос
    document.getElementById('img-up').onchange = (e) => {
        const f = e.target.files[0]; const r = new FileReader();
        r.onload = (ev) => { const img = new Image(); img.src = ev.target.result; img.onload = () => { const cvs = document.createElement('canvas'); const s = 400 / img.width; cvs.width = 400; cvs.height = img.height * s; cvs.getContext('2d').drawImage(img,0,0,400,cvs.height); sendVibe('image', cvs.toDataURL('image/jpeg', 0.6)); }; };
        r.readAsDataURL(f);
    };

    const micBtn = document.getElementById('mic-btn');
    micBtn.onmousedown = micBtn.ontouchstart = async (e) => {
        e.preventDefault();
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const reader = new FileReader(); reader.onloadend = () => sendVibe('audio', reader.result);
                reader.readAsDataURL(new Blob(audioChunks, { type: 'audio/webm' })); audioChunks = [];
            };
            mediaRecorder.start(); micBtn.classList.add('record-btn');
        } catch(e) { alert("Включи микрофон!"); }
    };
    micBtn.onmouseup = micBtn.ontouchend = (e) => {
        e.preventDefault();
        if(mediaRecorder && mediaRecorder.state === "recording") { mediaRecorder.stop(); mediaRecorder.stream.getTracks().forEach(t=>t.stop()); micBtn.classList.remove('record-btn'); }
    };

    // Звонки
    async function startCall() {
        if (!activeChat) return;
        currentCallPartner = activeChat; showCallUI('Вызов...', users.get(activeChat)?.nick || 'Собеседник', false);
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('local-video').srcObject = localStream; createPeerConnection();
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
            const offer = await peerConnection.createOffer(); await peerConnection.setLocalDescription(offer);
            client.publish(`v_dir_${currentCallPartner}`, JSON.stringify({ type: 'CALL_OFFER', from: my.id, nick: my.nick, sdp: offer }), {qos: 1});
        } catch (err) { alert('Нет камеры или микрофона!'); closeCallUI(); }
    }

    let incomingOffer = null;
    function handleIncomingCall(msg) { currentCallPartner = msg.from; incomingOffer = msg.sdp; showCallUI('Входящий видеовызов...', msg.nick, true); }

    async function acceptCall() {
        document.getElementById('btn-accept-call').style.display = 'none'; document.getElementById('call-status').innerText = 'Соединение...';
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('local-video').srcObject = localStream; createPeerConnection();
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
            await peerConnection.setRemoteDescription(new RTCSessionDescription(incomingOffer));
            const answer = await peerConnection.createAnswer(); await peerConnection.setLocalDescription(answer);
            client.publish(`v_dir_${currentCallPartner}`, JSON.stringify({ type: 'CALL_ANSWER', from: my.id, sdp: answer }), {qos: 1});
            document.getElementById('call-status').innerText = 'На линии';
        } catch (err) { alert('Ошибка доступа!'); endCall(); }
    }

    function createPeerConnection() {
        peerConnection = new RTCPeerConnection(rtcConfig); iceQueue = [];
        peerConnection.onicecandidate = (event) => { if (event.candidate) client.publish(`v_dir_${currentCallPartner}`, JSON.stringify({ type: 'CALL_ICE', from: my.id, candidate: event.candidate }), {qos: 0}); };
        peerConnection.ontrack = (event) => { document.getElementById('remote-video').srcObject = event.streams[0]; document.getElementById('call-status').innerText = ''; };
    }
    function processIceQueue() { while (iceQueue.length > 0) peerConnection.addIceCandidate(new RTCIceCandidate(iceQueue.shift())); }

    function endCall() { if (currentCallPartner) client.publish(`v_dir_${currentCallPartner}`, JSON.stringify({ type: 'CALL_END', from: my.id }), {qos: 1}); closeCallUI(); }
    function closeCallUI() {
        document.getElementById('call-screen').style.display = 'none';
        if (peerConnection) { peerConnection.close(); peerConnection = null; }
        if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
        currentCallPartner = null; incomingOffer = null;
    }

    init();
</script>

</body>
</html>
