<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIBE v21 Ultra</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        :root {
            --bg: #0e1621; --panel: #17212b; --accent: #5288c1; --text: #ffffff;
            --msg-mine: #2b5278; --msg-other: #182533; --muted: #7f91a4;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }
        
        header { background: var(--panel); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #000; }
        #status { font-size: 12px; color: #ffab00; }
        
        #chat { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .m { max-width: 85%; padding: 8px 12px; border-radius: 12px; line-height: 1.4; position: relative; font-size: 15px; }
        .mine { background: var(--msg-mine); align-self: flex-end; border-bottom-right-radius: 2px; }
        .other { background: var(--msg-other); align-self: flex-start; border-bottom-left-radius: 2px; }
        
        .meta { font-size: 10px; opacity: 0.6; margin-top: 4px; text-align: right; }

        .input-box { background: var(--panel); padding: 10px; display: flex; gap: 10px; padding-bottom: 25px; }
        input { flex: 1; background: var(--bg); border: 1px solid #333; color: #fff; padding: 10px; border-radius: 20px; outline: none; }
        button { background: var(--accent); border: none; color: #fff; padding: 0 15px; border-radius: 20px; font-weight: bold; }
        
        #login-screen { position: fixed; inset: 0; background: var(--bg); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2>Введите ваш логин</h2>
        <input type="text" id="my-name" placeholder="Например: vanya777" style="flex:none; width: 250px;">
        <button onclick="startApp()" style="height: 40px;">Войти в чат</button>
    </div>

    <header>
        <div>
            <b id="display-name">Чат</b>
            <div id="status">подключение...</div>
        </div>
        <input type="text" id="target-name" placeholder="Кому пишем?" style="width: 120px; font-size: 12px; padding: 5px;">
    </header>

    <div id="chat"></div>

    <div class="input-box">
        <input type="text" id="msg-input" placeholder="Сообщение...">
        <button onclick="send()">➤</button>
    </div>

<script>
    let client, myId, targetId;
    const chat = document.getElementById('chat');

    function startApp() {
        myId = document.getElementById('my-name').value.trim().toLowerCase();
        if(!myId) return alert("Введите имя!");
        
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('display-name').innerText = "@" + myId;
        
        // Подключаемся к брокеру
        client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');

        client.on('connect', () => {
            document.getElementById('status').innerText = "● В СЕТИ";
            document.getElementById('status').style.color = "#4caf50";
            client.subscribe('vibe21/' + myId);
        });

        client.on('message', (topic, payload) => {
            const data = JSON.parse(payload.toString());
            addMsg(data.text, 'other', data.from);
        });

        client.on('offline', () => {
            document.getElementById('status').innerText = "○ ОТКЛЮЧЕН";
            document.getElementById('status').style.color = "#f44336";
        });
    }

    function send() {
        targetId = document.getElementById('target-name').value.trim().toLowerCase();
        const text = document.getElementById('msg-input').value.trim();
        
        if(!targetId) return alert("Укажите имя получателя вверху!");
        if(!text) return;

        const payload = { from: myId, text: text };
        client.publish('vibe21/' + targetId, JSON.stringify(payload));
        
        addMsg(text, 'mine');
        document.getElementById('msg-input').value = "";
    }

    function addMsg(text, type, from = "") {
        const div = document.createElement('div');
        div.className = `m ${type}`;
        div.innerHTML = (from ? `<div style="font-size:10px; color:var(--accent)">@${from}</div>` : "") + 
                        `<div>${text}</div>` +
                        `<div class="meta">${new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>`;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    document.getElementById('msg-input').onkeypress = (e) => { if(e.key === 'Enter') send(); };
</script>
</body>
</html>
