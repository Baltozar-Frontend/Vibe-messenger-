<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>P2P Messenger (No Server)</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --bg: #0f172a; --panel: #1e293b; --accent: #3b82f6; --text: #f8fafc; --muted: #94a3b8;
            --msg-mine: #2563eb; --msg-other: #334155; --success: #22c55e; --danger: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        header { background: var(--panel); padding: 20px 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); z-index: 10; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        
        .id-box { background: rgba(0,0,0,0.2); padding: 8px 12px; border-radius: 8px; margin-top: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #334155; }
        .id-box code { color: var(--success); font-size: 16px; font-weight: bold; letter-spacing: 1px;}
        
        .connect-box { display: flex; gap: 8px; margin-top: 12px; }
        .connect-box input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: var(--bg); color: var(--text); outline: none; }
        .connect-box button { padding: 0 20px; border-radius: 8px; border: none; background: var(--accent); color: white; font-weight: bold; cursor: pointer; }

        #status-bar { text-align: center; padding: 8px; font-size: 13px; font-weight: bold; background: var(--danger); transition: 0.3s; }
        #status-bar.connected { background: var(--success); }

        #chat-area { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 10px 14px; border-radius: 12px; line-height: 1.4; word-wrap: break-word; }
        .msg.mine { background: var(--msg-mine); align-self: flex-end; border-bottom-right-radius: 2px; }
        .msg.other { background: var(--msg-other); align-self: flex-start; border-bottom-left-radius: 2px; }

        .input-area { padding: 12px 16px 24px; background: var(--panel); display: flex; gap: 10px; }
        .input-area input { flex: 1; padding: 12px 16px; border-radius: 24px; border: none; background: var(--bg); color: var(--text); outline: none; font-size: 16px; }
        .input-area button { width: 46px; height: 46px; border-radius: 50%; border: none; background: var(--accent); color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; opacity: 0.5; pointer-events: none; }
        .input-area button.active { opacity: 1; pointer-events: auto; }
    </style>
</head>
<body>

    <header>
        <div class="flex-between">
            <h2>P2P Tunnel</h2>
            <button onclick="location.reload()" style="background:none;border:none;color:var(--muted);cursor:pointer;">⟳ Сброс</button>
        </div>
        <div class="id-box">
            <span>Ваш ID:</span>
            <code id="my-id">загрузка...</code>
        </div>
        <div class="connect-box" id="connect-ui">
            <input type="text" id="target-id" placeholder="Введите ID друга...">
            <button onclick="connectToPeer()">Соединить</button>
        </div>
    </header>

    <div id="status-bar">Ожидание подключения...</div>

    <div id="chat-area"></div>

    <div class="input-area">
        <input type="text" id="msg-input" placeholder="Введите сообщение..." autocomplete="off" disabled>
        <button id="send-btn" onclick="sendMessage()">➤</button>
    </div>

<script>
    // Генерируем простой 4-значный ID для удобства
    const myCode = Math.floor(1000 + Math.random() * 9000).toString();
    const prefix = 'vibe_p2p_'; 
    
    // Инициализируем Peer (используем публичный сигнальный сервер только для знакомства)
    const peer = new Peer(prefix + myCode);
    let conn = null; // Здесь будет храниться прямое соединение

    peer.on('open', function(id) {
        document.getElementById('my-id').innerText = myCode;
    });

    peer.on('error', function(err) {
        alert('Ошибка P2P: ' + err.type);
    });

    // Если КТО-ТО подключается К НАМ
    peer.on('connection', function(connection) {
        conn = connection;
        setupConnection();
    });

    // Если МЫ подключаемся к кому-то
    function connectToPeer() {
        const targetCode = document.getElementById('target-id').value.trim();
        if (!targetCode) return;
        if (targetCode === myCode) return alert("Это ваш собственный ID!");
        
        document.getElementById('status-bar').innerText = 'Установка P2P соединения...';
        conn = peer.connect(prefix + targetCode);
        setupConnection();
    }

    // Настраиваем логику чата после соединения
    function setupConnection() {
        conn.on('open', function() {
            // Соединение установлено!
            const statusBar = document.getElementById('status-bar');
            statusBar.innerText = '🔒 Прямое P2P соединение установлено!';
            statusBar.classList.add('connected');
            
            document.getElementById('connect-ui').style.display = 'none';
            document.getElementById('msg-input').disabled = false;
            document.getElementById('send-btn').classList.add('active');
            
            addMessage("Система: Туннель создан. Теперь вы общаетесь напрямую, без серверов.", "other");
        });

        conn.on('data', function(data) {
            // Получено сообщение от друга
            addMessage(data, 'other');
        });

        conn.on('close', function() {
            document.getElementById('status-bar').innerText = 'Соединение разорвано';
            document.getElementById('status-bar').classList.remove('connected');
            document.getElementById('msg-input').disabled = true;
            document.getElementById('send-btn').classList.remove('active');
        });
    }

    function sendMessage() {
        const input = document.getElementById('msg-input');
        const text = input.value.trim();
        
        if (text && conn && conn.open) {
            // Отправляем НАПРЯМУЮ в браузер друга
            conn.send(text);
            addMessage(text, 'mine');
            input.value = '';
        }
    }

    function addMessage(text, type) {
        const chatArea = document.getElementById('chat-area');
        const msgDiv = document.createElement('div');
        msgDiv.className = `msg ${type}`;
        msgDiv.innerText = text;
        chatArea.appendChild(msgDiv);
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    // Отправка по Enter
    document.getElementById('msg-input').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') sendMessage();
    });
</script>

</body>
</html>
