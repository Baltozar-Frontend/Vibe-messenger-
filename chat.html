<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIBE OVERKILL</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        :root {
            --bg: #000; --accent: #3390ec; --success: #34c759;
            --text: #fff; --muted: #8e8e93; --msg-other: #212124;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* HEADER */
        header { padding: 45px 20px 15px; background: #0f0f0f; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        .my-nick { font-size: 24px; font-weight: 800; color: var(--accent); cursor: pointer; }

        /* CONTACTS */
        #contact-list { flex: 1; overflow-y: auto; padding: 10px; }
        .user-card { background: #111; margin-bottom: 8px; padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #1c1c1e; }
        .badge { background: var(--accent); color: white; padding: 2px 8px; border-radius: 10px; font-size: 12px; display: none; }

        /* CHAT WINDOW */
        #chat-window { position: fixed; inset: 0; background: #000; z-index: 100; display: none; flex-direction: column; transform: translateX(100%); transition: 0.25s ease-out; }
        #chat-window.active { display: flex; transform: translateX(0); }
        .chat-head { padding: 45px 15px 10px; background: #111; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #222; }
        .back { font-size: 30px; color: var(--accent); cursor: pointer; }
        
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .msg { max-width: 80%; padding: 10px 14px; border-radius: 18px; font-size: 15px; position: relative; animation: fadeIn 0.2s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .msg.mine { align-self: flex-end; background: var(--accent); border-bottom-right-radius: 4px; }
        .msg.other { align-self: flex-start; background: var(--msg-other); border-bottom-left-radius: 4px; }
        .msg-info { font-size: 10px; opacity: 0.7; margin-top: 4px; display: flex; justify-content: flex-end; gap: 4px; }
        
        .msg img { max-width: 100%; border-radius: 10px; margin-top: 5px; }
        .msg audio { max-width: 200px; height: 30px; margin-top: 5px; }

        /* INPUT */
        .input-area { padding: 10px 15px 30px; background: #0f0f0f; display: flex; gap: 10px; align-items: center; border-top: 1px solid #222; }
        .msg-input { flex: 1; background: #1c1c1e; border: none; color: #fff; padding: 12px 15px; border-radius: 20px; outline: none; font-size: 16px; }
        .btn { background: none; border: none; color: var(--accent); font-size: 24px; cursor: pointer; }
        .btn-send { background: var(--accent); color: white; border-radius: 50%; width: 40px; height: 40px; font-size: 18px; display: flex; align-items: center; justify-content: center; }

        /* CALLS */
        #call-screen { position: fixed; inset: 0; background: #000; z-index: 200; display: none; flex-direction: column; }
        #remote-video { width: 100%; height: 100%; object-fit: cover; }
        #local-video { width: 90px; height: 130px; position: absolute; bottom: 100px; right: 20px; border-radius: 10px; background: #222; border: 1px solid #444; }
        .call-ui { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: space-between; padding: 60px 20px 40px; text-align: center; pointer-events: none; }
        .btn-group { display: flex; justify-content: center; gap: 40px; pointer-events: auto; }
        .call-end { background: #ff3b30; width: 65px; height: 65px; border-radius: 50%; border: none; font-size: 30px; color: #fff; }
        .call-accept { background: #34c759; width: 65px; height: 65px; border-radius: 50%; border: none; font-size: 30px; color: #fff; display: none; }
    </style>
</head>
<body>

<div id="app">
    <header>
        <div class="my-nick" onclick="changeNick()" id="me-nick">User</div>
        <div style="font-size: 12px; color: var(--success);">● LIVE</div>
    </header>
    <div id="contact-list"></div>
</div>

<div id="chat-window">
    <div class="chat-head">
        <div class="back" onclick="closeChat()">‹</div>
        <div style="flex:1"><b id="p-nick">Nick</b></div>
        <div onclick="startCall()" style="font-size: 22px; cursor: pointer;">📞</div>
    </div>
    <div id="messages"></div>
    <div class="input-area">
        <label class="btn">📎<input type="file" id="f-up" style="display:none"></label>
        <input type="text" id="m-in" class="msg-input" placeholder="Сообщение...">
        <button class="btn" id="m-btn">🎤</button>
        <button class="btn-send" onclick="send('text')">➤</button>
    </div>
</div>

<div id="call-screen">
    <video id="remote-video" autoplay playsinline></video>
    <video id="local-video" autoplay playsinline muted></video>
    <div class="call-ui">
        <div>
            <h1 id="c-name">Partner</h1>
            <p id="c-status">Вызов...</p>
        </div>
        <div class="btn-group">
            <button class="call-end" onclick="hang()">☎</button>
            <button class="call-accept" id="c-acc" onclick="answer()">📞</button>
        </div>
    </div>
</div>

<script>
    // КОНФИГ
    const MY_ID = localStorage.getItem('v12_id') || 'u' + Math.random().toString(36).substr(2, 7);
    localStorage.setItem('v12_id', MY_ID);
    let MY_NICK = localStorage.getItem('v12_nick') || 'User_' + Math.floor(Math.random()*99);
    
    const RADAR_TOPIC = 'v12_radar_secure_sys';
    const DB_KEY = 'v12_db_store';
    
    let client, activeChat = null, users = new Map();
    let db = JSON.parse(localStorage.getItem(DB_KEY)) || {};
    let pc, localStream, currentCallId;

    document.getElementById('me-nick').innerText = MY_NICK;

    function init() {
        client = mqtt.connect('wss://broker.emqx.io:8084/mqtt', { 
            clientId: 'cl_' + MY_ID + '_' + Math.random().toString(16).substr(2,4),
            clean: true,
            connectTimeout: 4000
        });

        client.on('connect', () => {
            client.subscribe(RADAR_TOPIC);
            client.subscribe(`v12/to/${MY_ID}/#`); // Личные сообщения
            setInterval(() => {
                client.publish(RADAR_TOPIC, JSON.stringify({id: MY_ID, nick: MY_NICK, t: Date.now()}));
            }, 2000);
        });

        client.on('message', (topic, payload) => {
            const data = JSON.parse(payload.toString());
            if (topic === RADAR_TOPIC) {
                if (data.id !== MY_ID) {
                    users.set(data.id, {nick: data.nick, last: Date.now(), unread: users.get(data.id)?.unread || 0});
                    renderUsers();
                }
            } else {
                handleIn(data);
            }
        });
    }

    function handleIn(msg) {
        if (msg.type === 'msg') {
            if (!db[msg.from]) db[msg.from] = [];
            if (db[msg.from].some(m => m.mId === msg.mId)) return; // Дубли вон
            
            db[msg.from].push(msg);
            save();
            
            // Подтверждаем получение сразу (ACK)
            client.publish(`v12/to/${msg.from}/ack`, JSON.stringify({mId: msg.mId, to: MY_ID}), {qos: 1});

            if (activeChat === msg.from) loadMsgs();
            else { users.get(msg.from).unread++; renderUsers(); }
        } 
        else if (msg.type === 'ack') {
            Object.values(db).forEach(chat => {
                const m = chat.find(x => x.mId === msg.mId);
                if (m) { m.ok = true; save(); if (activeChat) loadMsgs(); }
            });
        }
        else if (msg.type === 'offer') { currentCallId = msg.from; showCall(msg.nick, true); incoming = msg.sdp; }
        else if (msg.type === 'answer') { pc.setRemoteDescription(new RTCSessionDescription(msg.sdp)); }
        else if (msg.type === 'ice') { if(pc) pc.addIceCandidate(new RTCIceCandidate(msg.cand)); }
        else if (msg.type === 'hang') { stopCall(); }
    }

    function send(type, body = null) {
        const txt = body || document.getElementById('m-in').value.trim();
        if (!txt || !activeChat) return;
        
        const mId = 'm' + Date.now();
        const pkg = { mId, type: 'msg', from: MY_ID, body: txt, mType: type, t: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}), ok: false };
        
        if (!db[activeChat]) db[activeChat] = [];
        db[activeChat].push(pkg);
        save();
        
        // Шлем с QoS 1
        client.publish(`v12/to/${activeChat}/msg`, JSON.stringify(pkg), {qos: 1});
        
        if (!body) document.getElementById('m-in').value = '';
        loadMsgs();
    }

    function renderUsers() {
        const list = document.getElementById('contact-list');
        list.innerHTML = '';
        users.forEach((u, id) => {
            if (Date.now() - u.last > 6000) return;
            const badge = u.unread > 0 ? `<div class="badge" style="display:block">${u.unread}</div>` : '';
            list.innerHTML += `<div class="user-card" onclick="openChat('${id}')">
                <div><b>${u.nick}</b><br><small style="color:var(--success)">онлайн</small></div>
                ${badge}
            </div>`;
        });
    }

    function openChat(id) {
        activeChat = id;
        users.get(id).unread = 0;
        document.getElementById('p-nick').innerText = users.get(id).nick;
        document.getElementById('chat-window').classList.add('active');
        renderUsers();
        loadMsgs();
    }

    function loadMsgs() {
        const box = document.getElementById('messages');
        box.innerHTML = '';
        (db[activeChat] || []).forEach(m => {
            const mine = m.from === MY_ID;
            const content = m.mType === 'text' ? m.body : m.mType === 'img' ? `<img src="${m.body}">` : `<audio controls src="${m.body}"></audio>`;
            const check = mine ? (m.ok ? ' ✓✓' : ' ✓') : '';
            box.innerHTML += `<div class="msg ${mine?'mine':'other'}">${content}<div class="msg-info">${m.t}${check}</div></div>`;
        });
        box.scrollTop = box.scrollHeight;
    }

    function closeChat() { document.getElementById('chat-window').classList.remove('active'); activeChat = null; }
    function changeNick() { const n = prompt("Ник:", MY_NICK); if(n) { MY_NICK = n; localStorage.setItem('v12_nick', n); document.getElementById('me-nick').innerText = n; } }
    function save() { localStorage.setItem(DB_KEY, JSON.stringify(db)); }

    // МЕДИА
    document.getElementById('f-up').onchange = (e) => {
        const r = new FileReader(); r.readAsDataURL(e.target.files[0]);
        r.onload = () => send('img', r.result);
    };

    const mBtn = document.getElementById('m-btn');
    let rec;
    mBtn.onmousedown = mBtn.ontouchstart = async () => {
        const s = await navigator.mediaDevices.getUserMedia({audio:true});
        rec = new MediaRecorder(s); let chunks = [];
        rec.ondataavailable = e => chunks.push(e.data);
        rec.onstop = () => { const r = new FileReader(); r.readAsDataURL(new Blob(chunks)); r.onload = () => send('audio', r.result); s.getTracks().forEach(t=>t.stop()); };
        rec.start(); mBtn.style.color = 'red';
    };
    mBtn.onmouseup = mBtn.ontouchend = () => { if(rec) rec.stop(); mBtn.style.color = 'var(--accent)'; };

    // ЗВОНКИ
    async function startCall() {
        showCall(users.get(activeChat).nick, false);
        currentCallId = activeChat;
        localStream = await navigator.mediaDevices.getUserMedia({video:true, audio:true});
        document.getElementById('local-video').srcObject = localStream;
        makePC();
        localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
        const o = await pc.createOffer(); await pc.setLocalDescription(o);
        client.publish(`v12/to/${currentCallId}/call`, JSON.stringify({type:'offer', from:MY_ID, nick:MY_NICK, sdp:o}));
    }

    let incoming;
    async function answer() {
        document.getElementById('c-acc').style.display = 'none';
        localStream = await navigator.mediaDevices.getUserMedia({video:true, audio:true});
        document.getElementById('local-video').srcObject = localStream;
        makePC();
        localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
        await pc.setRemoteDescription(new RTCSessionDescription(incoming));
        const a = await pc.createAnswer(); await pc.setLocalDescription(a);
        client.publish(`v12/to/${currentCallId}/call`, JSON.stringify({type:'answer', from:MY_ID, sdp:a}));
    }

    function makePC() {
        pc = new RTCPeerConnection({iceServers:[{urls:'stun:stun.l.google.com:19302'}]});
        pc.onicecandidate = e => { if(e.candidate) client.publish(`v12/to/${currentCallId}/call`, JSON.stringify({type:'ice', from:MY_ID, cand:e.candidate})); };
        pc.ontrack = e => document.getElementById('remote-video').srcObject = e.streams[0];
    }

    function hang() { client.publish(`v12/to/${currentCallId}/call`, JSON.stringify({type:'hang', from:MY_ID})); stopCall(); }
    function stopCall() {
        document.getElementById('call-screen').style.display = 'none';
        if(pc) pc.close(); if(localStream) localStream.getTracks().forEach(t=>t.stop());
    }
    function showCall(n, isIn) {
        document.getElementById('call-screen').style.display = 'flex';
        document.getElementById('c-name').innerText = n;
        document.getElementById('c-acc').style.display = isIn ? 'block' : 'none';
    }

    init();
</script>
</body>
</html>
