<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Telegram V18.2 (EMQX)</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        :root {
            --bg: #0e1621; --header-bg: #17212b; --msg-mine: #2b5278; --msg-other: #182533;
            --accent: #5288c1; --text-main: #ffffff; --text-muted: #7f91a4; 
            --tick-gray: #7fa6c8; --tick-blue: #5eb5f7; --divider: #0b1016; --danger: #e17076;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text-main); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

        header { padding: 40px 16px 12px; background: var(--header-bg); display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        .logo-area h1 { font-size: 20px; font-weight: 600; }
        .my-status { font-size: 13px; color: var(--accent); margin-top: 2px; }
        
        .search-bar { background: var(--header-bg); padding: 10px 16px; border-bottom: 1px solid var(--divider); display: flex; gap: 8px; box-shadow: 0 1px 2px rgba(0,0,0,0.2); z-index: 9;}
        .search-bar input { flex: 1; background: var(--bg); border: none; color: var(--text-main); padding: 10px 16px; border-radius: 20px; outline: none; font-size: 15px; }
        .search-bar button { background: var(--accent); color: white; border: none; padding: 0 16px; border-radius: 20px; font-weight: 500; cursor: pointer; }

        #contact-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
        .user-card { padding: 10px 16px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: 0.1s; }
        .user-card:active { background: var(--header-bg); }
        .avatar { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: bold; color: #fff; flex-shrink: 0; }
        .u-info { flex: 1; display: flex; flex-direction: column; justify-content: center; border-bottom: 1px solid var(--divider); padding-bottom: 12px; padding-top: 2px; }
        .u-info-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }
        .u-name { font-size: 16px; font-weight: 500; }
        .u-lastmsg { font-size: 14px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }
        .unread-dot { background: var(--text-muted); color: var(--bg); min-width: 22px; height: 22px; border-radius: 11px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; padding: 0 6px; }

        #chat-window { position: fixed; inset: 0; background: var(--bg); z-index: 100; display: none; flex-direction: column; transform: translateX(100%); transition: transform 0.2s ease-out; }
        #chat-window.active { display: flex; transform: translateX(0); }
        .chat-head { padding: 40px 16px 10px; background: var(--header-bg); display: flex; align-items: center; gap: 12px; box-shadow: 0 1px 2px rgba(0,0,0,0.2); }
        .back-btn { font-size: 28px; color: var(--text-muted); cursor: pointer; margin-right: 4px; padding-bottom: 2px; }
        .partner-info { flex: 1; display: flex; flex-direction: column; }
        .partner-info b { font-size: 16px; font-weight: 500; }
        .partner-info span { font-size: 13px; color: var(--text-muted); margin-top: 1px; }
        
        #messages { flex: 1; overflow-y: auto; padding: 16px 12px; display: flex; flex-direction: column; gap: 4px; }
        .msg-row { display: flex; width: 100%; }
        .msg { max-width: 82%; padding: 6px 12px; border-radius: 12px; font-size: 15px; line-height: 1.4; position: relative; color: var(--text-main); word-wrap: break-word; box-shadow: 0 1px 1px rgba(0,0,0,0.2); }
        .msg.mine { background: var(--msg-mine); margin-left: auto; border-bottom-right-radius: 0; }
        .msg.other { background: var(--msg-other); border-bottom-left-radius: 0; }
        
        .msg-meta { float: right; margin: 6px 0 -4px 10px; font-size: 11px; color: rgba(255,255,255,0.5); display: flex; align-items: center; gap: 4px; }
        .st-sent { color: var(--tick-gray); font-weight: bold; } 
        .st-read { color: var(--tick-blue); font-weight: bold; } 

        .typing-label { font-size: 13px; color: var(--accent); padding: 4px 16px; height: 24px; opacity: 0; transition: 0.2s; position: absolute; bottom: 65px; left: 0; background: var(--bg); width: 100%; }
        .typing-label.show { opacity: 1; }
        .input-wrap { padding: 8px 12px 24px; background: var(--header-bg); display: flex; align-items: flex-end; gap: 10px; position: relative; z-index: 2; border-top: 1px solid var(--divider); }
        #main-input { flex: 1; background: var(--bg); border: none; color: var(--text-main); padding: 10px 16px; border-radius: 20px; outline: none; font-size: 16px; max-height: 120px; resize: none; margin-bottom: 2px; }
        .send-trigger { width: 44px; height: 44px; border-radius: 50%; background: var(--accent); color: white; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; font-size: 20px; }
        
        .empty-state { text-align: center; color: var(--text-muted); padding: 40px 20px; font-size: 15px; line-height: 1.5; }
    </style>
</head>
<body>

<div id="app">
    <header>
        <div class="logo-area">
            <h1>VIBE Chat</h1>
            <div class="my-status" id="sys-status">подключение...</div>
        </div>
        <div style="text-align: right;">
            <div style="font-size: 12px; color: var(--text-muted);">твой ID</div>
            <b id="my-username" style="color: var(--accent);">@user</b>
        </div>
    </header>
    <div class="search-bar">
        <input type="text" id="search-input" placeholder="Введите @username друга..." autocomplete="off">
        <button onclick="searchUser()">Найти</button>
    </div>
    <div id="contact-list"></div>
</div>

<div id="chat-window">
    <div class="chat-head">
        <div class="back-btn" onclick="closeChat()">‹</div>
        <div class="avatar" id="p-ava" style="width: 36px; height: 36px; font-size: 14px;">P</div>
        <div class="partner-info">
            <b id="p-name">@username</b>
            <span id="p-status" style="color: var(--tick-blue);">закрытый канал</span>
        </div>
    </div>
    <div id="messages"></div>
    <div class="typing-label" id="typing-box">печатает...</div>
    <div class="input-wrap">
        <textarea id="main-input" rows="1" placeholder="Сообщение..."></textarea>
        <button class="send-trigger" id="action-btn">➤</button>
    </div>
</div>

<script>
    function setupUsername() {
        let un = localStorage.getItem('tg18_username');
        while (!un || !/^[a-z0-9_]{3,15}$/.test(un)) {
            un = prompt("Придумай свой логин (только англ. буквы и цифры, без пробелов):");
            if(un) un = un.toLowerCase().trim();
        }
        localStorage.setItem('tg18_username', un);
        return un;
    }

    const MY_USERNAME = setupUsername();
    document.getElementById('my-username').innerText = '@' + MY_USERNAME;

    // Перешли на супер-стабильный сервер EMQX
    const CONFIG = {
        broker: 'wss://broker.emqx.io:8084/mqtt',
        prefix: 'vibe_app/user/', 
    };
    
    const colors = ['#e17076', '#faa774', '#a695e7', '#7bc862', '#6ec9cb', '#65aadd', '#ee7aae'];
    function getAvaColor(str) { 
        let hash = 0; for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
        return colors[Math.abs(hash) % colors.length]; 
    }

    let client, activePartner = null;
    let db = JSON.parse(localStorage.getItem('tg18_db')) || {};

    function init() {
        updateStatus('соединение с EMQX...', 'var(--accent)');

        // clean: true решает проблему зависания сессий на публичных серверах
        client = mqtt.connect(CONFIG.broker, { 
            clientId: 'vibe_' + MY_USERNAME + '_' + Math.random().toString(16).substr(2,8), 
            clean: true, 
            keepalive: 30,
            reconnectPeriod: 2000 
        });

        client.on('connect', () => {
            updateStatus('в сети', 'var(--tick-blue)');
            // Слушаем свой топик
            client.subscribe(CONFIG.prefix + MY_USERNAME + '/#', { qos: 0 });
        });

        client.on('offline', () => updateStatus('ожидание сети...', 'var(--text-muted)'));
        client.on('error', (err) => console.error('MQTT Error:', err));
        
        client.on('message', (topic, payload) => {
            try {
                const data = JSON.parse(payload.toString());
                handleIncoming(topic, data);
            } catch(e) {}
        });

        renderContacts();
    }

    function updateStatus(text, color) {
        const el = document.getElementById('sys-status');
        el.innerText = text; el.style.color = color;
    }

    function handleIncoming(topic, data) {
        const fromUser = data.from;

        if (data.type === 'msg') {
            // Мгновенно шлем ответ "доставлено"
            client.publish(CONFIG.prefix + fromUser + '/sys', JSON.stringify({type: 'ack_received', mId: data.mId, from: MY_USERNAME}), {qos: 0});

            ensureUserExists(fromUser);
            const exists = db[fromUser].msgs.find(m => m.mId === data.mId);
            
            if (activePartner === fromUser) {
                // Если чат открыт - шлем ответ "прочитано"
                client.publish(CONFIG.prefix + fromUser + '/sys', JSON.stringify({type: 'ack_read', mId: data.mId, from: MY_USERNAME}), {qos: 0});
                data.status = 'read';
            } else {
                data.status = 'received';
            }

            if (!exists) {
                db[fromUser].msgs.push(data);
                if (activePartner !== fromUser) db[fromUser].unread++;
                save(); renderContacts();
                if (activePartner === fromUser) { renderMsgs(); scroll(); }
            }
        } 
        else if (data.type === 'ack_received') updateMsgStatus(data.from, data.mId, 'sent');
        else if (data.type === 'ack_read') updateMsgStatus(data.from, data.mId, 'read');
        else if (data.type === 'typing' && activePartner === fromUser) showTyping();
    }

    function updateMsgStatus(chatUser, mId, newStatus) {
        if (!db[chatUser]) return;
        const m = db[chatUser].msgs.find(x => x.mId === mId);
        if (m) {
            if (m.status === 'read') return; 
            m.status = newStatus;
            save(); if (activePartner === chatUser) renderMsgs(); 
        }
    }

    function sendMsg() {
        const input = document.getElementById('main-input');
        const text = input.value.trim();
        if (!text || !activePartner) return;

        const pkg = { 
            mId: 'm_' + Date.now(), type: 'msg', from: MY_USERNAME, to: activePartner, 
            body: text, time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}), status: 'sent' 
        };

        db[activePartner].msgs.push(pkg);
        save(); renderMsgs(); renderContacts(); scroll();

        // Отправка (qos: 0 гарантирует быструю доставку без ожидания подтверждения сервером)
        if (client && client.connected) {
            client.publish(CONFIG.prefix + activePartner + '/msg', JSON.stringify(pkg), {qos: 0});
        }

        input.value = ''; input.style.height = 'auto';
    }

    function ensureUserExists(username) {
        if (!db[username]) { db[username] = { unread: 0, msgs: [] }; save(); }
    }

    function searchUser() {
        let q = document.getElementById('search-input').value.toLowerCase().trim().replace('@', '');
        if (!q) return;
        if (q === MY_USERNAME) return alert("Это твой юзернейм!");
        
        ensureUserExists(q);
        document.getElementById('search-input').value = '';
        renderContacts(); openChat(q);
    }

    function renderContacts() {
        const container = document.getElementById('contact-list');
        container.innerHTML = '';
        const users = Object.keys(db).sort((a,b) => {
            const lastA = db[a].msgs[db[a].msgs.length-1]?.mId || 0;
            const lastB = db[b].msgs[db[b].msgs.length-1]?.mId || 0;
            return lastB < lastA ? -1 : 1;
        });

        if (users.length === 0) {
            container.innerHTML = '<div class="empty-state">Нет контактов.<br>Введите @username друга в поиск.</div>';
            return;
        }

        users.forEach(u => {
            const data = db[u];
            const badge = data.unread > 0 ? `<div class="unread-dot">${data.unread}</div>` : '';
            const bg = getAvaColor(u);
            const initial = u.charAt(0).toUpperCase();
            const lastMsgObj = data.msgs[data.msgs.length-1];
            let lastText = lastMsgObj ? (lastMsgObj.from === MY_USERNAME ? 'Вы: ' : '') + lastMsgObj.body : 'Нет сообщений';
            
            container.innerHTML += `
                <div class="user-card" onclick="openChat('${u}')">
                    <div class="avatar" style="background: ${bg}">${initial}</div>
                    <div class="u-info">
                        <div class="u-info-top"><div class="u-name">@${u}</div>${badge}</div>
                        <div class="u-lastmsg">${lastText}</div>
                    </div>
                </div>`;
        });
    }

    function openChat(username) {
        activePartner = username;
        db[username].unread = 0;
        
        document.getElementById('p-name').innerText = '@' + username;
        const pAva = document.getElementById('p-ava');
        pAva.innerText = username.charAt(0).toUpperCase(); pAva.style.background = getAvaColor(username);

        document.getElementById('chat-window').classList.add('active');
        
        let changed = false;
        db[username].msgs.forEach(m => {
            if (m.from === username && m.status !== 'read') {
                if(client && client.connected) {
                    client.publish(CONFIG.prefix + username + '/sys', JSON.stringify({type: 'ack_read', mId: m.mId, from: MY_USERNAME}), {qos: 0});
                }
                m.status = 'read'; changed = true;
            }
        });
        if (changed) save();
        
        renderContacts(); renderMsgs(); setTimeout(scroll, 50);
    }

    function renderMsgs() {
        const box = document.getElementById('messages');
        box.innerHTML = '';
        (db[activePartner]?.msgs || []).forEach(m => {
            const mine = m.from === MY_USERNAME;
            let statusIcon = '';
            if (mine) {
                if (m.status === 'sent') statusIcon = '<span class="st-sent">✓</span>';
                else if (m.status === 'read') statusIcon = '<span class="st-read">✓✓</span>';
            }
            box.innerHTML += `
                <div class="msg-row">
                    <div class="msg ${mine?'mine':'other'}">
                        ${m.body}
                        <span class="msg-meta">${m.time} ${statusIcon}</span>
                    </div>
                </div>`;
        });
    }

    function closeChat() { document.getElementById('chat-window').classList.remove('active'); activePartner = null; renderContacts(); }
    function scroll() { const b = document.getElementById('messages'); b.scrollTop = b.scrollHeight; }
    function save() { localStorage.setItem('tg18_db', JSON.stringify(db)); }

    const inp = document.getElementById('main-input');
    inp.addEventListener('input', () => {
        inp.style.height = 'auto'; inp.style.height = Math.min(inp.scrollHeight, 120) + 'px';
        if (activePartner && client && client.connected) {
            client.publish(CONFIG.prefix + activePartner + '/sys', JSON.stringify({type:'typing', from: MY_USERNAME}), {qos: 0});
        }
    });

    document.getElementById('action-btn').onclick = sendMsg;
    document.getElementById('search-input').addEventListener('keypress', function(e) { if(e.key === 'Enter') searchUser(); });

    let typingT;
    function showTyping() {
        const b = document.getElementById('typing-box'); b.classList.add('show');
        clearTimeout(typingT); typingT = setTimeout(() => b.classList.remove('show'), 2000);
    }

    document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible' && client && !client.connected) {
            updateStatus('реконнект...', 'var(--accent)');
            client.reconnect();
        }
    });

    init();
</script>

</body>
</html>
