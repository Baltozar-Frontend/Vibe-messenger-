<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Telegram V17</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        :root {
            --bg: #0e1621; --header-bg: #17212b; --msg-mine: #2b5278; --msg-other: #182533;
            --accent: #5288c1; --text-main: #ffffff; --text-muted: #7f91a4; 
            --tick-gray: #7fa6c8; --tick-blue: #5eb5f7; --divider: #0b1016;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text-main); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

        /* HEADER */
        header { padding: 40px 16px 12px; background: var(--header-bg); border-bottom: 1px solid var(--divider); display: flex; justify-content: space-between; align-items: center; z-index: 10; box-shadow: 0 1px 2px rgba(0,0,0,0.2); }
        .logo-area h1 { font-size: 20px; font-weight: 600; }
        .my-status { font-size: 13px; color: var(--accent); margin-top: 2px; }
        #me-nick { background: none; border: none; color: var(--text-main); font-size: 16px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .my-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; }

        /* CONTACTS */
        #contact-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
        .user-card { padding: 10px 16px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: background 0.1s; }
        .user-card:active { background: var(--header-bg); }
        .avatar { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: bold; color: #fff; flex-shrink: 0; }
        .u-info { flex: 1; display: flex; flex-direction: column; justify-content: center; border-bottom: 1px solid var(--divider); padding-bottom: 12px; padding-top: 2px; }
        .u-info-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }
        .u-name { font-size: 16px; font-weight: 500; }
        .unread-dot { background: var(--text-muted); color: var(--bg); min-width: 22px; height: 22px; border-radius: 11px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; padding: 0 6px; }

        /* CHAT WINDOW */
        #chat-window { position: fixed; inset: 0; background: var(--bg); z-index: 100; display: none; flex-direction: column; transform: translateX(100%); transition: transform 0.2s ease-out; }
        #chat-window.active { display: flex; transform: translateX(0); }
        .chat-head { padding: 40px 16px 10px; background: var(--header-bg); display: flex; align-items: center; gap: 12px; box-shadow: 0 1px 2px rgba(0,0,0,0.2); }
        .back-btn { font-size: 28px; color: var(--text-muted); cursor: pointer; margin-right: 4px; padding-bottom: 2px; }
        .p-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; }
        .partner-info { flex: 1; display: flex; flex-direction: column; }
        .partner-info b { font-size: 16px; font-weight: 500; }
        .partner-info span { font-size: 13px; color: var(--accent); margin-top: 1px; }
        
        #messages { flex: 1; overflow-y: auto; padding: 16px 12px; display: flex; flex-direction: column; gap: 4px; }
        .msg-row { display: flex; width: 100%; }
        .msg { max-width: 82%; padding: 6px 12px; border-radius: 12px; font-size: 15px; line-height: 1.4; position: relative; color: var(--text-main); word-wrap: break-word; box-shadow: 0 1px 1px rgba(0,0,0,0.2); }
        .msg.mine { background: var(--msg-mine); margin-left: auto; border-bottom-right-radius: 0; }
        .msg.other { background: var(--msg-other); border-bottom-left-radius: 0; }
        
        .msg-meta { float: right; margin: 6px 0 -4px 10px; font-size: 11px; color: rgba(255,255,255,0.5); display: flex; align-items: center; gap: 4px; }
        .status-icon { font-size: 13px; font-weight: bold; }
        .st-pending { color: rgba(255,255,255,0.3); } 
        .st-sent { color: var(--tick-gray); } 
        .st-read { color: var(--tick-blue); } 

        .msg img { max-width: 100%; border-radius: 8px; margin-top: 4px; cursor: pointer; display: block; }
        
        /* INPUT */
        .typing-label { font-size: 13px; color: var(--accent); padding: 4px 16px; height: 24px; opacity: 0; transition: 0.2s; position: absolute; bottom: 65px; left: 0; background: var(--bg); width: 100%; }
        .typing-label.show { opacity: 1; }
        .input-wrap { padding: 8px 12px 24px; background: var(--header-bg); display: flex; align-items: flex-end; gap: 10px; position: relative; z-index: 2; border-top: 1px solid var(--divider); }
        .attach-btn { font-size: 24px; color: var(--text-muted); cursor: pointer; padding: 8px; }
        #main-input { flex: 1; background: var(--bg); border: none; color: var(--text-main); padding: 10px 16px; border-radius: 20px; outline: none; font-size: 16px; max-height: 120px; resize: none; margin-bottom: 2px; }
        .send-trigger { width: 44px; height: 44px; border-radius: 50%; background: var(--accent); color: white; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; font-size: 20px; }
        .send-trigger:active { transform: scale(0.95); }
    </style>
</head>
<body>

<div id="app">
    <header>
        <div class="logo-area">
            <h1>Telegram V17</h1>
            <div class="my-status" id="sys-status">подключение...</div>
        </div>
        <button id="me-nick" onclick="editNick()">
            <span id="ui-my-name">User</span>
            <div class="my-avatar" id="ui-my-ava">U</div>
        </button>
    </header>
    <div id="contact-list"></div>
</div>

<div id="chat-window">
    <div class="chat-head">
        <div class="back-btn" onclick="closeChat()">‹</div>
        <div class="p-avatar" id="p-ava">P</div>
        <div class="partner-info">
            <b id="p-name">Partner</b>
            <span id="p-status">в сети</span>
        </div>
    </div>
    <div id="messages"></div>
    <div class="typing-label" id="typing-box">печатает...</div>
    <div class="input-wrap">
        <label class="attach-btn">📎<input type="file" id="upload-img" accept="image/*" style="display:none"></label>
        <textarea id="main-input" rows="1" placeholder="Сообщение..."></textarea>
        <button class="send-trigger" id="action-btn">➤</button>
    </div>
</div>

<script>
    // Изолируем конфигурацию и переводим на стабильный HiveMQ
    const CONFIG = {
        broker: 'wss://broker.hivemq.com:8443/mqtt',
        radarTopic: 'tg_v17_radar_core',
        prefix: 'tg_v17_data/',
        myId: localStorage.getItem('tg17_uid') || 'u_' + Math.random().toString(36).substr(2, 9),
        nick: localStorage.getItem('tg17_nick') || 'User_' + Math.floor(Math.random()*99)
    };
    localStorage.setItem('tg17_uid', CONFIG.myId);
    
    const colors = ['#e17076', '#faa774', '#a695e7', '#7bc862', '#6ec9cb', '#65aadd', '#ee7aae'];
    function getAvaColor(id) { return colors[id.charCodeAt(id.length-1) % colors.length]; }
    
    function updateMyUI() {
        document.getElementById('ui-my-name').innerText = CONFIG.nick;
        const ava = document.getElementById('ui-my-ava');
        ava.innerText = CONFIG.nick.charAt(0).toUpperCase();
        ava.style.background = getAvaColor(CONFIG.myId);
    }
    updateMyUI();

    let client, activePartner = null, users = new Map();
    let db = JSON.parse(localStorage.getItem('tg17_db')) || {};
    let lastPing = Date.now();

    function init() {
        // Жесткая фиксация ClientID и Clean Session = false для сохранения сообщений сервером
        client = mqtt.connect(CONFIG.broker, { 
            clientId: 'v17_core_' + CONFIG.myId, 
            clean: false, 
            keepalive: 10,
            reconnectPeriod: 1000 
        });

        client.on('connect', () => {
            updateStatus('в сети', 'var(--tick-blue)');
            client.subscribe(CONFIG.radarTopic, { qos: 1 });
            client.subscribe(CONFIG.prefix + CONFIG.myId + '/#', { qos: 1 });
            
            lastPing = Date.now();
            resendPendingMessages();
        });

        client.on('offline', () => updateStatus('ожидание сети...', 'var(--text-muted)'));
        client.on('reconnect', () => updateStatus('обновление...', 'var(--accent)'));

        client.on('message', (topic, payload) => {
            const data = JSON.parse(payload.toString());
            
            // Если мы получили радар от себя же — значит соединение 100% живое
            if (topic === CONFIG.radarTopic && data.id === CONFIG.myId) lastPing = Date.now();

            if (topic === CONFIG.radarTopic) {
                if (data.id !== CONFIG.myId) handleRadar(data);
            } else {
                handleIncoming(data);
            }
        });
    }

    function updateStatus(text, color) {
        const el = document.getElementById('sys-status');
        el.innerText = text; el.style.color = color;
    }

    // --- СИСТЕМЫ ЖИВУЧЕСТИ ---
    
    // 1. Радар + Пинг-понг
    setInterval(() => {
        if (client && client.connected) {
            client.publish(CONFIG.radarTopic, JSON.stringify({id: CONFIG.myId, nick: CONFIG.nick, t: Date.now()}), {qos: 0});
        }
    }, 2500);

    // 2. Watchdog (Сторожевой пес) - убивает зависший сокет браузера
    setInterval(() => {
        if (Date.now() - lastPing > 15000 && client) {
            updateStatus('переподключение...', 'var(--danger)');
            client.end(true); // Жестко рвем мертвое соединение
            setTimeout(init, 500); // Перезапускаем
            lastPing = Date.now();
        }
    }, 5000);

    // 3. Visibility API - мгновенно будит чат, когда открываешь вкладку/телефон
    document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible') {
            updateStatus('синхронизация...', 'var(--accent)');
            if (client) {
                client.reconnect();
                resendPendingMessages();
            }
        }
    });

    // --- ЛОГИКА СООБЩЕНИЙ ---
    function handleIncoming(data) {
        const from = data.from;

        if (data.type === 'msg') {
            // МГНОВЕННО шлем ответ: 1 галочка (доставлено на устройство)
            client.publish(CONFIG.prefix + from + '/sys', JSON.stringify({type: 'ack_received', mId: data.mId, from: CONFIG.myId}), {qos: 1});

            if (!db[from]) db[from] = [];
            const exists = db[from].find(m => m.mId === data.mId);
            
            if (activePartner === from) {
                // Если чат открыт: 2 галочки (прочитано)
                client.publish(CONFIG.prefix + from + '/sys', JSON.stringify({type: 'ack_read', mId: data.mId, from: CONFIG.myId}), {qos: 1});
                data.status = 'read';
            } else {
                data.status = 'received';
            }

            if (!exists) {
                db[from].push(data);
                save();
                if (activePartner === from) { renderMsgs(); scroll(); }
                else { let u = users.get(from); if (u) { u.unread = (u.unread || 0) + 1; renderUsers(); } }
            }
        } 
        else if (data.type === 'ack_received') updateMsgStatus(data.from, data.mId, 'sent');
        else if (data.type === 'ack_read') updateMsgStatus(data.from, data.mId, 'read');
        else if (data.type === 'typing' && activePartner === from) showTyping();
    }

    function updateMsgStatus(chatId, mId, newStatus) {
        if (!db[chatId]) return;
        const m = db[chatId].find(x => x.mId === mId);
        if (m) {
            if (m.status === 'read') return; 
            m.status = newStatus;
            save();
            if (activePartner === chatId) renderMsgs(); 
        }
    }

    // Постоянная долбежка сервера, пока сообщение не уйдет
    function resendPendingMessages() {
        Object.keys(db).forEach(chatId => {
            db[chatId].forEach(m => {
                if (m.from === CONFIG.myId && m.status === 'pending') {
                    if (client && client.connected) {
                        client.publish(CONFIG.prefix + chatId + '/msg', JSON.stringify(m), {qos: 1});
                    }
                }
            });
        });
    }
    // Проталкиваем очередь каждые 3 секунды
    setInterval(resendPendingMessages, 3000);

    function sendVibe(mType, body = null) {
        const input = document.getElementById('main-input');
        const text = body || input.value.trim();
        if (!text || !activePartner) return;

        const pkg = { mId: 'm_' + Date.now(), type: 'msg', from: CONFIG.myId, to: activePartner, body: text, mType: mType, time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}), status: 'pending' };

        if (!db[activePartner]) db[activePartner] = [];
        db[activePartner].push(pkg);
        save(); renderMsgs(); scroll();

        if (client && client.connected) {
            client.publish(CONFIG.prefix + activePartner + '/msg', JSON.stringify(pkg), {qos: 1});
        }

        if (!body) { input.value = ''; input.style.height = 'auto'; }
    }

    // --- ИНТЕРФЕЙС ---
    function handleRadar(u) {
        users.set(u.id, { ...u, last: Date.now(), unread: users.get(u.id)?.unread || 0 });
        renderUsers();
    }

    function renderUsers() {
        const container = document.getElementById('contact-list');
        container.innerHTML = '';
        const sorted = Array.from(users.values()).sort((a,b) => b.last - a.last);
        
        let onlineCount = 0;
        sorted.forEach(u => {
            if (Date.now() - u.last > 10000) return; 
            onlineCount++;
            const badge = u.unread > 0 ? `<div class="unread-dot">${u.unread}</div>` : '';
            const bg = getAvaColor(u.id);
            const initial = u.nick.charAt(0).toUpperCase();
            
            container.innerHTML += `
                <div class="user-card" onclick="openChat('${u.id}')">
                    <div class="avatar" style="background: ${bg}">${initial}</div>
                    <div class="u-info">
                        <div class="u-info-top"><div class="u-name">${u.nick}</div>${badge}</div>
                        <div class="u-status" style="color:var(--accent); font-size:13px">в сети</div>
                    </div>
                </div>`;
        });
        if (onlineCount === 0) container.innerHTML = '<div style="text-align: center; color: var(--text-muted); padding: 40px; font-size: 15px;">Радар ищет контакты...</div>';
    }

    function openChat(id) {
        activePartner = id;
        const u = users.get(id);
        if(u) u.unread = 0;
        
        document.getElementById('p-name').innerText = u ? u.nick : 'User';
        const pAva = document.getElementById('p-ava');
        pAva.innerText = u ? u.nick.charAt(0).toUpperCase() : 'U';
        pAva.style.background = getAvaColor(id);

        document.getElementById('chat-window').classList.add('active');
        
        if (db[id]) {
            let changed = false;
            db[id].forEach(m => {
                if (m.from === id && m.status !== 'read') {
                    client.publish(CONFIG.prefix + id + '/sys', JSON.stringify({type: 'ack_read', mId: m.mId, from: CONFIG.myId}), {qos: 1});
                    m.status = 'read';
                    changed = true;
                }
            });
            if (changed) save();
        }
        renderUsers(); renderMsgs(); setTimeout(scroll, 50);
    }

    function renderMsgs() {
        const box = document.getElementById('messages');
        box.innerHTML = '';
        (db[activePartner] || []).forEach(m => {
            const mine = m.from === CONFIG.myId;
            const content = m.mType === 'text' ? m.body : `<img src="${m.body}">`;
            
            let statusIcon = '';
            if (mine) {
                if (m.status === 'pending') statusIcon = '<span class="status-icon st-pending">🕒</span>';
                else if (m.status === 'sent') statusIcon = '<span class="status-icon st-sent">✓</span>';
                else if (m.status === 'read') statusIcon = '<span class="status-icon st-read">✓✓</span>';
            }

            box.innerHTML += `
                <div class="msg-row">
                    <div class="msg ${mine?'mine':'other'}">
                        ${content}
                        <span class="msg-meta">${m.time} ${statusIcon}</span>
                    </div>
                </div>`;
        });
    }

    function closeChat() { document.getElementById('chat-window').classList.remove('active'); activePartner = null; }
    function scroll() { const b = document.getElementById('messages'); b.scrollTop = b.scrollHeight; }
    function save() { localStorage.setItem('tg17_db', JSON.stringify(db)); }

    function editNick() {
        const n = prompt("Ваше имя:", CONFIG.nick);
        if (n && n.trim()) { CONFIG.nick = n.trim(); localStorage.setItem('tg17_nick', CONFIG.nick); updateMyUI(); }
    }

    const inp = document.getElementById('main-input');
    inp.addEventListener('input', () => {
        inp.style.height = 'auto'; inp.style.height = Math.min(inp.scrollHeight, 120) + 'px';
        if (activePartner && client && client.connected) {
            client.publish(CONFIG.prefix + activePartner + '/sys', JSON.stringify({type:'typing', from:CONFIG.myId}), {qos: 0});
        }
    });

    document.getElementById('action-btn').onclick = () => sendVibe('text');

    let typingT;
    function showTyping() {
        const b = document.getElementById('typing-box'); b.classList.add('show');
        clearTimeout(typingT); typingT = setTimeout(() => b.classList.remove('show'), 2000);
    }

    document.getElementById('upload-img').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            const img = new Image(); img.src = ev.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas'); const MAX = 600; let w = img.width, h = img.height;
                if (w > h) { if(w > MAX){ h *= MAX/w; w = MAX; } } else { if(h > MAX){ w *= MAX/h; h = MAX; } }
                canvas.width = w; canvas.height = h; canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                sendVibe('img', canvas.toDataURL('image/jpeg', 0.6));
            };
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    init();
</script>

</body>
</html>
