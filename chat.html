<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIBE PRIVATE</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        :root {
            --bg: #000000;
            --panel: #1c1c1e;
            --accent: #007aff;
            --text: #ffffff;
            --muted: #8e8e93;
            --msg-other: #262629;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, system-ui, sans-serif; }

        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* --- ВХОД --- */
        #login-screen {
            position: fixed; inset: 0; background: var(--bg); z-index: 2000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .login-box { width: 80%; max-width: 300px; text-align: center; }
        .login-input {
            width: 100%; background: var(--panel); border: 1px solid #333; color: white;
            padding: 16px; border-radius: 14px; font-size: 16px; margin-bottom: 15px; outline: none;
        }
        .login-btn {
            width: 100%; background: var(--accent); color: white; border: none;
            padding: 16px; border-radius: 14px; font-weight: bold;
        }

        /* --- ГЛАВНЫЙ ЭКРАН (СПИСОК ЛЮДЕЙ) --- */
        #main-screen { display: flex; flex-direction: column; height: 100%; }
        header {
            padding: 20px 16px; border-bottom: 0.5px solid #333;
            display: flex; justify-content: space-between; align-items: center;
        }
        .user-item {
            padding: 16px; border-bottom: 0.5px solid #222;
            display: flex; justify-content: space-between; align-items: center;
            transition: 0.2s;
        }
        .user-item:active { background: #1c1c1e; }
        .user-info b { display: block; font-size: 16px; }
        .user-info span { font-size: 12px; color: var(--muted); }
        .msg-icon {
            width: 40px; height: 40px; background: var(--accent);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 18px; cursor: pointer;
        }

        /* --- ОКНО ЧАТА (СКРЫТО ПО УМОЛЧАНИЮ) --- */
        #chat-screen {
            position: fixed; inset: 0; background: var(--bg); z-index: 100;
            display: none; flex-direction: column;
            transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #chat-screen.active { display: flex; transform: translateX(0); }

        .chat-header {
            padding: 12px 16px; background: var(--panel);
            display: flex; align-items: center; gap: 15px; border-bottom: 0.5px solid #333;
        }
        .back-btn { font-size: 24px; color: var(--accent); cursor: pointer; }

        #chat-messages {
            flex: 1; overflow-y: auto; padding: 16px;
            display: flex; flex-direction: column; gap: 10px;
        }

        /* --- ПУЗЫРЬКИ --- */
        .bubble {
            max-width: 75%; padding: 10px 14px; border-radius: 18px; font-size: 15px;
            line-height: 1.4; position: relative;
        }
        .bubble.mine { align-self: flex-end; background: var(--accent); border-bottom-right-radius: 4px; }
        .bubble.other { align-self: flex-start; background: var(--msg-other); border-bottom-left-radius: 4px; }
        .bubble img { max-width: 100%; border-radius: 12px; margin-top: 5px; }
        .bubble-time { font-size: 10px; opacity: 0.5; margin-top: 4px; display: block; text-align: right; }

        /* --- ВВОД --- */
        .chat-input-area {
            padding: 10px 16px; background: var(--panel);
            display: flex; gap: 10px; align-items: center;
            padding-bottom: max(10px, env(safe-area-inset-bottom));
        }
        .input-field {
            flex: 1; background: #2c2c2e; border: none; color: white;
            padding: 10px 16px; border-radius: 20px; outline: none;
        }

        /* --- АНИМАЦИЯ ПЕЧАТАЕТ --- */
        #typing-indicator {
            font-size: 12px; color: var(--accent); padding-left: 20px;
            height: 20px; display: none;
        }

    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h1 style="margin-bottom:20px">VIBE <span style="color:var(--accent)">PRVT</span></h1>
            <input type="text" id="nick-input" class="login-input" placeholder="Ваше имя">
            <button class="login-btn" onclick="join()">НАЧАТЬ</button>
        </div>
    </div>

    <div id="main-screen">
        <header>
            <h2 style="font-size: 24px;">Люди в сети</h2>
            <div id="my-status" style="font-size:12px; color:var(--accent)">● Online</div>
        </header>
        <div id="user-list" style="flex:1; overflow-y:auto">
            </div>
    </div>

    <div id="chat-screen">
        <div class="chat-header">
            <div class="back-btn" onclick="closeChat()">‹</div>
            <div>
                <b id="chat-with-name">Имя друга</b>
                <div id="chat-with-info" style="font-size:10px; color:var(--muted)">IP: ... | OS: ...</div>
            </div>
        </div>
        
        <div id="chat-messages"></div>
        <div id="typing-indicator">печатает...</div>

        <div class="chat-input-area">
            <label style="font-size:24px; color:var(--accent)">
                + <input type="file" id="file-up" style="display:none" accept="image/*">
            </label>
            <input type="text" id="msg-input" class="input-field" placeholder="Сообщение...">
            <button onclick="sendMsg()" style="background:none; border:none; color:var(--accent); font-weight:bold; font-size:18px">➤</button>
        </div>
    </div>

    <script>
        const BROKER = 'wss://broker.emqx.io:8084/mqtt';
        const RADAR_TOPIC = 'vibe_v6_radar_global';
        
        let myData = {
            id: localStorage.getItem('vibe_v6_id') || 'u_' + Math.random().toString(36).substr(2, 9),
            nick: localStorage.getItem('vibe_v6_nick') || '',
            ip: '...', os: navigator.platform
        };
        localStorage.setItem('vibe_v6_id', myData.id);

        let client;
        let activePartnerId = null;
        let onlineUsers = new Map();
        // Структура: { partnerId: [messages] }
        let chatStorage = JSON.parse(localStorage.getItem('vibe_v6_storage')) || {};

        if (myData.nick) {
            document.getElementById('login-screen').style.display = 'none';
            init();
        }

        async function join() {
            const n = document.getElementById('nick-input').value.trim();
            if (n) {
                myData.nick = n;
                localStorage.setItem('vibe_v6_nick', n);
                document.getElementById('login-screen').style.display = 'none';
                init();
            }
        }

        function init() {
            fetch('https://api.ipify.org?format=json').then(r => r.json()).then(d => myData.ip = d.ip);
            
            client = mqtt.connect(BROKER, { clientId: 'vibe_cl_' + myData.id });

            client.on('connect', () => {
                client.subscribe(RADAR_TOPIC);
                client.subscribe(`vibe_v6_direct_${myData.id}`); // Мой личный канал

                // Сообщаем всем, что мы тут
                setInterval(() => {
                    client.publish(RADAR_TOPIC, JSON.stringify({ type: 'PING', user: myData }));
                }, 2000);
            });

            client.on('message', (topic, payload) => {
                const data = JSON.parse(payload.toString());
                
                if (topic === RADAR_TOPIC) {
                    if (data.type === 'PING') {
                        onlineUsers.set(data.user.id, { ...data.user, last: Date.now() });
                        renderUserList();
                    }
                } else {
                    // Это личное сообщение!
                    handlePrivateMessage(data);
                }
            });

            // Проверка на оффлайн
            setInterval(() => {
                const now = Date.now();
                onlineUsers.forEach((u, id) => {
                    if (now - u.last > 6000) onlineUsers.delete(id);
                });
                renderUserList();
            }, 5000);
        }

        function renderUserList() {
            const list = document.getElementById('user-list');
            list.innerHTML = '';
            onlineUsers.forEach((user, id) => {
                if (id === myData.id) return;
                const item = document.createElement('div');
                item.className = 'user-item';
                item.innerHTML = `
                    <div class="user-info">
                        <b>${user.nick}</b>
                        <span>${user.os} | ${user.ip}</span>
                    </div>
                    <div class="msg-icon" onclick="openChat('${id}')">💬</div>
                `;
                list.appendChild(item);
            });
        }

        // --- ЛОГИКА ЧАТА ---
        function openChat(partnerId) {
            activePartnerId = partnerId;
            const user = onlineUsers.get(partnerId);
            document.getElementById('chat-with-name').innerText = user.nick;
            document.getElementById('chat-with-info').innerText = `IP: ${user.ip} | OS: ${user.os}`;
            
            document.getElementById('chat-screen').classList.add('active');
            document.getElementById('chat-screen').style.display = 'flex';
            renderMessages();
        }

        function closeChat() {
            document.getElementById('chat-screen').classList.remove('active');
            setTimeout(() => { document.getElementById('chat-screen').style.display = 'none'; }, 300);
            activePartnerId = null;
        }

        function sendMsg(type = 'text', content = null) {
            const val = content || document.getElementById('msg-input').value.trim();
            if (!val || !activePartnerId) return;

            const msg = {
                senderId: myData.id,
                senderNick: myData.nick,
                body: val,
                type: type,
                time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
            };

            // Отправляем в личный канал партнера
            client.publish(`vibe_v6_direct_${activePartnerId}`, JSON.stringify(msg));

            // Сохраняем у себя
            saveMessage(activePartnerId, msg);
            if (type === 'text') document.getElementById('msg-input').value = '';
            renderMessages();
        }

        function handlePrivateMessage(msg) {
            saveMessage(msg.senderId, msg);
            if (activePartnerId === msg.senderId) {
                renderMessages();
            } else {
                // Можно добавить звук или уведомление, что пришло сообщение от другого
                console.log("Новое сообщение от " + msg.senderNick);
            }
        }

        function saveMessage(chatId, msg) {
            if (!chatStorage[chatId]) chatStorage[chatId] = [];
            chatStorage[chatId].push(msg);
            if (chatStorage[chatId].length > 50) chatStorage[chatId].shift();
            localStorage.setItem('vibe_v6_storage', JSON.stringify(chatStorage));
        }

        function renderMessages() {
            const container = document.getElementById('chat-messages');
            container.innerHTML = '';
            const msgs = chatStorage[activePartnerId] || [];
            
            msgs.forEach(m => {
                const isMine = m.senderId === myData.id;
                const div = document.createElement('div');
                div.className = `bubble ${isMine ? 'mine' : 'other'}`;
                
                let body = m.type === 'text' ? m.body : `<img src="${m.body}">`;
                div.innerHTML = `${body} <span class="bubble-time">${m.time}</span>`;
                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
        }

        // --- ФОТО И ВВОД ---
        document.getElementById('msg-input').onkeypress = (e) => { if(e.key === 'Enter') sendMsg(); };

        document.getElementById('file-up').onchange = (e) => {
            const file = e.target.files[0];
            const r = new FileReader();
            r.onload = (ev) => {
                const img = new Image();
                img.src = ev.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const scale = 400 / img.width;
                    canvas.width = 400; canvas.height = img.height * scale;
                    canvas.getContext('2d').drawImage(img, 0, 0, 400, canvas.height);
                    sendMsg('image', canvas.toDataURL('image/jpeg', 0.5));
                };
            };
            r.readAsDataURL(file);
        };
    </script>
</body>
</html>
