<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIBE PROJECT: OVERDRIVE</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #050505;
            --panel: #111113;
            --accent: #00ff66;
            --secondary: #0088ff;
            --text: #e0e0e0;
            --danger: #ff3333;
        }

        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Consolas', 'Monaco', monospace;
            overflow: hidden;
        }

        /* --- Layout --- */
        .app-wrapper {
            display: grid;
            grid-template-columns: 300px 1fr 250px;
            height: 100vh;
            border: 1px solid #222;
        }

        /* --- Sidebar: User Info --- */
        .sidebar {
            background: var(--panel);
            border-right: 1px solid #222;
            display: flex;
            flex-direction: column;
            padding: 15px;
            overflow-y: auto;
        }

        .user-card {
            background: #000;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--accent);
            margin-bottom: 20px;
            box-shadow: 0 0 10px rgba(0, 255, 102, 0.1);
        }

        .user-card h3 { margin: 0 0 10px 0; font-size: 14px; color: var(--accent); text-transform: uppercase; }
        .info-item { font-size: 11px; margin-bottom: 5px; color: #888; border-bottom: 1px solid #222; padding-bottom: 3px; }
        .info-item span { color: #fff; float: right; }

        /* --- Main Chat Area --- */
        .main-chat {
            display: flex;
            flex-direction: column;
            background: #080808;
        }

        header {
            padding: 15px 25px;
            background: #000;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 4px;
            position: relative;
            animation: slideIn 0.2s ease;
        }

        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

        .message.mine { align-self: flex-end; background: var(--secondary); color: white; border-left: 4px solid #fff; }
        .message.other { align-self: flex-start; background: #1a1a1c; border-left: 4px solid var(--accent); }
        .message .meta { font-size: 10px; opacity: 0.5; margin-bottom: 5px; display: block; }
        .message img { max-width: 100%; border-radius: 4px; margin-top: 10px; border: 1px solid rgba(255,255,255,0.1); }

        .chat-input-area {
            padding: 20px;
            background: #000;
            border-top: 1px solid #333;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        input[type="text"] {
            flex: 1;
            background: #111;
            border: 1px solid #444;
            color: white;
            padding: 12px;
            border-radius: 4px;
            outline: none;
        }

        input[type="text"]:focus { border-color: var(--accent); }

        .action-btn {
            background: none; border: none; color: #888; cursor: pointer; font-size: 18px; transition: 0.2s;
        }
        .action-btn:hover { color: var(--accent); }
        .send-btn { background: var(--accent); color: black; padding: 10px 20px; border-radius: 4px; font-weight: bold; }

        /* --- Right Sidebar: Online List --- */
        .online-list {
            background: var(--panel);
            border-left: 1px solid #222;
            padding: 15px;
        }

        .online-item {
            font-size: 12px;
            padding: 8px;
            background: #000;
            margin-bottom: 5px;
            border-radius: 4px;
            cursor: pointer;
            border: 1px solid #222;
        }
        .online-item:hover { border-color: var(--secondary); }
        .online-item.active { border-color: var(--accent); }

        /* --- Utilities --- */
        #file-input { display: none; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .online { background: var(--accent); }
        .offline { background: var(--danger); }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #333; }

        @media (max-width: 900px) {
            .sidebar, .online-list { display: none; }
            .app-wrapper { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="app-wrapper">
    <aside class="sidebar">
        <div class="user-card">
            <h3>Твой профиль</h3>
            <div id="my-info">
                <div class="info-item">ID: <span id="my-peer-id">---</span></div>
                <div class="info-item">IP: <span id="my-ip">Определяем...</span></div>
                <div class="info-item">Браузер: <span id="my-browser">...</span></div>
                <div class="info-item">OS: <span id="my-os">...</span></div>
            </div>
        </div>
        
        <div style="font-size: 10px; color: #444; margin-top: auto;">
            <p>> VIBE CORE v2.5.0</p>
            <p>> P2P ENCRYPTION: ACTIVE</p>
            <p>> DECENTRALIZED NETWORK</p>
        </div>
    </aside>

    <main class="main-chat">
        <header>
            <div><i class="fa-solid fa-terminal" style="color: var(--accent);"></i> GLOBAL_HUB</div>
            <div id="connection-status"><span class="status-dot offline"></span> DISCONNECTED</div>
        </header>

        <div id="chat-messages">
            </div>

        <div class="chat-input-area">
            <label class="action-btn">
                <i class="fa-solid fa-paperclip"></i>
                <input type="file" id="file-input" accept="image/*">
            </label>
            <input type="text" id="msg-input" placeholder="Введите директиву..." autocomplete="off">
            <button class="action-btn send-btn" id="send-btn">SEND</button>
        </div>
    </main>

    <aside class="online-list">
        <h3 style="font-size: 12px; margin-bottom: 15px; color: #555;">NODES IN RANGE</h3>
        <div id="peers-container">
            </div>
    </aside>
</div>

<script>
    /**
     * VIBE CORE ENGINE
     * Децентрализованный чат на PeerJS
     */

    const config = {
        iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
    };

    let peer;
    let connections = {};
    let myData = {
        nick: "User_" + Math.floor(Math.random() * 1000),
        ip: "0.0.0.0",
        browser: navigator.userAgent.split(' ')[0],
        os: navigator.platform
    };

    // 1. Инициализация профиля и получение IP
    async function initUser() {
        try {
            const res = await fetch('https://api.ipify.org?format=json');
            const data = await res.json();
            myData.ip = data.ip;
            document.getElementById('my-ip').innerText = data.ip;
        } catch(e) { 
            document.getElementById('my-ip').innerText = "Hidden/VPN";
        }
        document.getElementById('my-browser').innerText = myData.browser;
        document.getElementById('my-os').innerText = myData.os;
        
        startPeer();
    }

    // 2. Запуск P2P
    function startPeer() {
        // Мы используем публичный ID, который можно передать другу для связи
        // В реальном проекте здесь можно использовать фиксированные ID
        peer = new Peer(myData.nick + "_" + Math.floor(Math.random()*999), {
            debug: 2,
            config: config
        });

        peer.on('open', (id) => {
            document.getElementById('my-peer-id').innerText = id;
            document.getElementById('connection-status').innerHTML = '<span class="status-dot online"></span> ONLINE';
            addSystemMessage("Узел инициализирован: " + id);
            
            // Если ты открыл 2 вкладки, тебе нужно "соединиться" с другой.
            // В P2P чатах обычно используют сигнальный сервер для поиска всех, 
            // но так как мы без регистрации, мы имитируем "подключение по ID"
            console.log("Твой ID для других: ", id);
        });

        // Слушаем входящие подключения
        peer.on('connection', (conn) => {
            setupConnection(conn);
        });

        peer.on('error', (err) => {
            console.error(err);
            addSystemMessage("Ошибка сети: " + err.type);
        });
    }

    function setupConnection(conn) {
        connections[conn.peer] = conn;
        
        conn.on('open', () => {
            addSystemMessage("Установлена связь с: " + conn.peer);
            updateOnlineList();
            // Отправляем свои данные новому другу
            conn.send({ type: 'HANDSHAKE', user: myData });
        });

        conn.on('data', (data) => {
            handleIncomingData(data, conn.peer);
        });

        conn.on('close', () => {
            addSystemMessage("Связь разорвана: " + conn.peer);
            delete connections[conn.peer];
            updateOnlineList();
        });
    }

    // 3. Обработка данных
    function handleIncomingData(data, senderPeer) {
        if (data.type === 'CHAT') {
            appendMessage(data.user.nick, data.text, 'other', data.user);
        } else if (data.type === 'IMAGE') {
            appendMessage(data.user.nick, data.image, 'other', data.user, true);
        } else if (data.type === 'HANDSHAKE') {
            // Получили IP и инфо другого пользователя
            updatePeerInfo(senderPeer, data.user);
        }
    }

    // 4. Интерфейс
    function appendMessage(sender, content, side, info = {}, isImg = false) {
        const chatWindow = document.getElementById('chat-messages');
        const div = document.createElement('div');
        div.className = `message ${side}`;
        
        let meta = `<span class="meta">${sender} [IP: ${info.ip || '??'}] [OS: ${info.os || '??'}]</span>`;
        let body = isImg ? `<img src="${content}">` : `<div>${content}</div>`;
        
        div.innerHTML = meta + body;
        chatWindow.appendChild(div);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function addSystemMessage(text) {
        const chatWindow = document.getElementById('chat-messages');
        const div = document.createElement('div');
        div.style.cssText = "text-align: center; font-size: 10px; color: #444; margin: 10px 0;";
        div.innerText = ">> " + text;
        chatWindow.appendChild(div);
    }

    function updateOnlineList() {
        const container = document.getElementById('peers-container');
        container.innerHTML = '';
        Object.keys(connections).forEach(id => {
            const div = document.createElement('div');
            div.className = 'online-item';
            div.innerText = id;
            container.appendChild(div);
        });
    }

    function updatePeerInfo(id, info) {
        // Можно выводить в лог или обновлять список
        console.log(`Данные узла ${id}:`, info);
    }

    // 5. Отправка
    function broadcast(payload) {
        Object.values(connections).forEach(conn => {
            if (conn.open) conn.send(payload);
        });
        // Добавляем себе
        if (payload.type === 'CHAT') appendMessage('YOU', payload.text, 'mine', myData);
        if (payload.type === 'IMAGE') appendMessage('YOU', payload.image, 'mine', myData, true);
    }

    document.getElementById('send-btn').onclick = () => {
        const input = document.getElementById('msg-input');
        if (input.value.trim()) {
            // Если мы ни к кому не подключены, но хотим потестить - пробуем подключиться к себе (или по ID)
            if (Object.keys(connections).length === 0) {
                const target = prompt("С кем связаться? Введите ID другого окна/вкладки:");
                if (target) {
                    const conn = peer.connect(target);
                    setupConnection(conn);
                    setTimeout(() => broadcast({ type: 'CHAT', text: input.value, user: myData }), 1000);
                }
            } else {
                broadcast({ type: 'CHAT', text: input.value, user: myData });
            }
            input.value = '';
        }
    };

    document.getElementById('file-input').onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (evt) => {
                broadcast({ type: 'IMAGE', image: evt.target.result, user: myData });
            };
            reader.readAsDataURL(file);
        }
    };

    // Слушаем Enter
    document.getElementById('msg-input').onkeyup = (e) => { if(e.key === 'Enter') document.getElementById('send-btn').click(); };

    // Запуск
    initUser();

</script>
</body>
</html>
