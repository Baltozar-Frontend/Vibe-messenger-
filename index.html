<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIBE SONIC // GLOBAL</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        :root {
            --bg: #050505;
            --panel: #121214;
            --accent: #007aff; /* Классический синий Apple-style для твоих сообщений */
            --other: #262629;
            --text: #ffffff;
            --muted: #8e8e93;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, system-ui, sans-serif; }

        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* --- ВХОД --- */
        #login-screen {
            position: fixed; inset: 0; background: var(--bg); z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .login-box { width: 85%; max-width: 350px; text-align: center; }
        .login-box h1 { margin-bottom: 30px; font-weight: 800; letter-spacing: -1px; }
        input.nick-input {
            width: 100%; background: var(--panel); border: 1px solid #333; color: white;
            padding: 16px; border-radius: 14px; font-size: 16px; margin-bottom: 15px; outline: none;
        }
        .start-btn {
            width: 100%; background: var(--accent); color: white; border: none;
            padding: 16px; border-radius: 14px; font-weight: bold; cursor: pointer;
        }

        /* --- ШАПКА --- */
        header {
            padding: 12px 16px; background: rgba(18, 18, 20, 0.8); backdrop-filter: blur(20px);
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 0.5px solid #333;
        }
        .status-group { display: flex; align-items: center; gap: 8px; }
        .indicator { width: 8px; height: 8px; background: #32d74b; border-radius: 50%; box-shadow: 0 0 10px #32d74b; }

        /* --- ЧАТ --- */
        #chat-flow {
            flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px;
            scroll-behavior: smooth;
        }
        .msg-wrapper { display: flex; flex-direction: column; margin-bottom: 8px; max-width: 80%; }
        .msg-wrapper.mine { align-self: flex-end; }
        .msg-wrapper.other { align-self: flex-start; }

        .author-tag { font-size: 11px; color: var(--muted); margin-bottom: 4px; margin-left: 12px; }
        .msg-bubble {
            padding: 10px 16px; border-radius: 20px; font-size: 15px; line-height: 1.4;
            position: relative; transition: 0.1s;
        }
        .mine .msg-bubble { background: var(--accent); border-bottom-right-radius: 4px; }
        .other .msg-bubble { background: var(--other); border-bottom-left-radius: 4px; }
        
        .msg-bubble img { max-width: 100%; border-radius: 12px; margin-top: 5px; }

        /* --- БОКОВАЯ ПАНЕЛЬ (ПРОФИЛИ) --- */
        #sidebar {
            position: fixed; right: -100%; top: 0; width: 80%; max-width: 300px; height: 100%;
            background: var(--panel); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 500; padding: 20px; border-left: 1px solid #333;
        }
        #sidebar.open { right: 0; }
        .sidebar-header { display: flex; justify-content: space-between; margin-bottom: 20px; color: var(--accent); font-weight: bold; }

        .profile-card {
            background: #000; border-radius: 12px; padding: 15px; margin-bottom: 10px;
            border: 0.5px solid #444; font-size: 12px;
        }
        .profile-card b { color: var(--accent); display: block; margin-bottom: 5px; font-size: 14px; }
        .profile-card span { color: var(--muted); }

        /* --- ВВОД --- */
        footer {
            padding: 12px 16px; background: var(--bg); border-top: 0.5px solid #333;
            display: flex; gap: 10px; align-items: center;
        }
        .input-box {
            flex: 1; background: var(--panel); border: none; color: white;
            padding: 12px 16px; border-radius: 22px; font-size: 15px; outline: none;
        }
        .circle-btn {
            width: 36px; height: 36px; border-radius: 50%; border: none;
            background: #262629; color: var(--accent); font-size: 20px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .send-btn-active { background: var(--accent); color: white; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h1>VIBE <span style="color: var(--accent)">SONIC</span></h1>
            <input type="text" id="nick-field" class="nick-input" placeholder="Никнейм">
            <button class="start-btn" onclick="joinChat()">ВОЙТИ В СЕТЬ</button>
        </div>
    </div>

    <header>
        <div class="status-group">
            <div class="indicator"></div>
            <span style="font-weight: 700; font-size: 14px;">VIBE GLOBAL</span>
        </div>
        <button onclick="toggleSidebar()" style="background:none; border:none; color:var(--accent); font-weight:bold; cursor:pointer;">
            👥 <span id="online-val">1</span>
        </button>
    </header>

    <div id="sidebar">
        <div class="sidebar-header">
            <span>УЗЛЫ В СЕТИ</span>
            <span onclick="toggleSidebar()" style="cursor:pointer">✕</span>
        </div>
        <div id="user-list"></div>
    </div>

    <div id="chat-flow"></div>

    <footer>
        <label class="circle-btn">
            + <input type="file" id="img-up" accept="image/*" style="display:none">
        </label>
        <input type="text" id="msg-input" class="input-box" placeholder="Сообщение..." autocomplete="off">
        <button class="circle-btn send-btn-active" id="send-vibe">➤</button>
    </footer>

    <script>
        // --- CONFIG ---
        const MQTT_HOST = 'wss://broker.emqx.io:8084/mqtt';
        const CHAT_TOPIC = 'vibe_v5_pro_stream';
        const SYS_TOPIC = 'vibe_v5_pro_sys';

        // Персональные данные (сохраняются навсегда)
        let myData = {
            id: localStorage.getItem('vibe_v5_id') || Math.random().toString(36).substr(2, 9),
            nick: localStorage.getItem('vibe_v5_nick') || '',
            ip: '0.0.0.0',
            os: navigator.platform,
            browser: 'App'
        };
        localStorage.setItem('vibe_v5_id', myData.id);

        let client;
        let history = JSON.parse(localStorage.getItem('vibe_v5_history')) || [];
        const activeUsers = new Map();

        // --- ВХОД ---
        if (myData.nick) {
            document.getElementById('login-screen').style.display = 'none';
            initConnection();
        }

        async function joinChat() {
            const n = document.getElementById('nick-field').value.trim();
            if (n) {
                myData.nick = n;
                localStorage.setItem('vibe_v5_nick', n);
                document.getElementById('login-screen').style.display = 'none';
                initConnection();
            }
        }

        // --- CORE ENGINE ---
        async function initConnection() {
            renderMessages();
            
            // Получаем IP для профиля
            fetch('https://api.ipify.org?format=json').then(r => r.json()).then(d => myData.ip = d.ip);

            client = mqtt.connect(MQTT_HOST, { clientId: 'v_id_' + myData.id });

            client.on('connect', () => {
                client.subscribe([CHAT_TOPIC, SYS_TOPIC]);
                
                // Радар
                setInterval(() => {
                    client.publish(SYS_TOPIC, JSON.stringify({ type: 'PING', user: myData }));
                }, 2000);

                // Запрос истории у тех, кто онлайн (для синхронизации)
                client.publish(SYS_TOPIC, JSON.stringify({ type: 'GET_H', from: myData.id }));
            });

            client.on('message', (topic, payload) => {
                const data = JSON.parse(payload.toString());

                if (topic === CHAT_TOPIC) {
                    processIncoming(data);
                } else if (topic === SYS_TOPIC) {
                    handleSystem(data);
                }
            });
        }

        function handleSystem(data) {
            if (data.type === 'PING') {
                activeUsers.set(data.user.id, { ...data.user, last: Date.now() });
                updateUserUI();
            }
            if (data.type === 'GET_H' && history.length > 0 && data.from !== myData.id) {
                client.publish(SYS_TOPIC, JSON.stringify({ type: 'SEND_H', to: data.from, h: history.slice(-30) }));
            }
            if (data.type === 'SEND_H' && data.to === myData.id) {
                mergeHistory(data.h);
            }
        }

        // --- MESSAGING ---
        function send(content, type = 'text') {
            const msg = {
                mId: Math.random().toString(36).substr(2, 9),
                uId: myData.id,
                uNick: myData.nick,
                body: content,
                type: type,
                ts: Date.now()
            };
            // QoS 0 для максимальной скорости
            client.publish(CHAT_TOPIC, JSON.stringify(msg), { qos: 0 });
        }

        function processIncoming(msg) {
            if (!history.find(x => x.mId === msg.mId)) {
                history.push(msg);
                if (history.length > 100) history.shift();
                localStorage.setItem('vibe_v5_history', JSON.stringify(history));
                displayMsg(msg);
            }
        }

        function displayMsg(msg) {
            const flow = document.getElementById('chat-flow');
            const isMine = msg.uId === myData.id;
            
            const wrapper = document.createElement('div');
            wrapper.className = `msg-wrapper ${isMine ? 'mine' : 'other'}`;
            
            const content = msg.type === 'text' 
                ? `<div>${msg.body}</div>` 
                : `<img src="${msg.body}">`;

            wrapper.innerHTML = `
                ${!isMine ? `<span class="author-tag">${msg.uNick}</span>` : ''}
                <div class="msg-bubble">${content}</div>
            `;
            
            flow.appendChild(wrapper);
            flow.scrollTop = flow.scrollHeight;
        }

        function renderMessages() {
            document.getElementById('chat-flow').innerHTML = '';
            history.forEach(displayMsg);
        }

        function mergeHistory(newH) {
            let changed = false;
            newH.forEach(m => {
                if (!history.find(x => x.mId === m.mId)) {
                    history.push(m);
                    changed = true;
                }
            });
            if (changed) {
                history.sort((a,b) => a.ts - b.ts);
                localStorage.setItem('vibe_v5_history', JSON.stringify(history));
                renderMessages();
            }
        }

        // --- UI ---
        function updateUserUI() {
            const list = document.getElementById('user-list');
            const count = document.getElementById('online-val');
            const now = Date.now();
            
            activeUsers.forEach((u, id) => {
                if (now - u.last > 6000) activeUsers.delete(id);
            });

            count.innerText = activeUsers.size;
            list.innerHTML = '';
            activeUsers.forEach(u => {
                const card = document.createElement('div');
                card.className = 'profile-card';
                card.innerHTML = `
                    <b>${u.nick} ${u.id === myData.id ? '(Вы)' : ''}</b>
                    <span>IP: ${u.ip}</span><br>
                    <span>OS: ${u.os}</span>
                `;
                list.appendChild(card);
            });
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }

        document.getElementById('send-vibe').onclick = () => {
            const i = document.getElementById('msg-input');
            if (i.value.trim()) { send(i.value); i.value = ''; }
        };

        document.getElementById('msg-input').onkeypress = (e) => { if(e.key === 'Enter') document.getElementById('send-vibe').click(); };

        document.getElementById('img-up').onchange = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.src = ev.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const scale = 400 / img.width;
                    canvas.width = 400; canvas.height = img.height * scale;
                    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                    send(canvas.toDataURL('image/jpeg', 0.5), 'image');
                };
            };
            reader.readAsDataURL(file);
        };
    </script>
</body>
</html>
